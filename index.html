<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL BLACKPILL TERMINAL v4.2</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        :root {
            --bg-base: #020202;
            --panel-bg: #080808;
            --border-dim: #1a1a1a;
            --border-focus: #444;
            --text-main: #a0a0a0;
            --accent-1: #00ffcc;
            --chad-gold: #ffcc00;
            --brutal-red: #ff0033;
            --normie-gray: #777777;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-mono);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: relative;
            z-index: 10;
        }

        h1 { 
            font-size: 1.5rem; 
            color: var(--brutal-red); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            text-shadow: 0 0 15px rgba(255,0,51,0.4); 
        }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr 380px;
            gap: 20px;
            height: calc(100vh - 80px);
            position: relative;
            z-index: 10;
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 350px 1fr; }
            .right-panel { grid-column: 1 / -1; }
        }
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; height: auto; }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .panel-header {
            background: #000;
            padding: 8px 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #555;
            border-bottom: 1px solid var(--border-dim);
            letter-spacing: 1px;
        }

        .panel-content { padding: 15px; overflow-y: auto; flex: 1; }

        .workspace {
            position: relative;
            width: 100%;
            min-height: 250px;
            background: #000;
            border: 1px dashed var(--border-focus);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .img-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        #targetImage { max-width: 100%; height: auto; display: block; filter: grayscale(100%) contrast(120%) brightness(80%); }
        canvas#overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

        .btn {
            background: transparent;
            border: 1px solid var(--border-focus);
            color: var(--text-main);
            padding: 12px;
            font-family: var(--font-mono);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .btn:hover:not(:disabled) { border-color: var(--brutal-red); color: var(--brutal-red); box-shadow: inset 0 0 15px rgba(255,0,51,0.2); }
        .btn:disabled { border-color: #111; color: #333; cursor: not-allowed; }

        .terminal { font-size: 0.8rem; line-height: 1.5; }
        .term-line { margin-bottom: 4px; padding-bottom: 2px; }
        .term-time { color: #555; margin-right: 10px; }
        .term-sys { color: #888; }
        .term-err { color: var(--brutal-red); text-shadow: 0 0 5px rgba(255,0,51,0.5); }
        .term-warn { color: var(--chad-gold); }
        .term-plus { color: var(--accent-1); text-shadow: 0 0 5px rgba(0,255,204,0.5); }

        .metric-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 10px 0; font-size: 0.9rem;}
        .metric-val { color: #fff; font-weight: bold; }

        .final-score { margin-top: 20px; padding: 20px; background: #000; border: 1px solid var(--border-dim); text-align: center; }
        .tier-label { font-size: 2rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        .score-val { font-size: 3rem; margin: 15px 0; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .score-desc { font-size: 0.85rem; color: #777; line-height: 1.6; text-align: justify; padding-top: 15px; border-top: 1px solid #111;}
        
        .cursor { display: inline-block; width: 8px; height: 15px; background: #555; animation: blink 1s step-end infinite; vertical-align: middle; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Strict PSL Engine</h1>
            <div style="color: #444; font-size: 0.75rem; margin-top: 5px;">Build 4.2.0 // Craniofacial & Adiposity Analysis</div>
        </div>
        <div style="color: #333; font-size: 0.75rem; text-align: right;">
            STATUS: <span id="sysStatus" style="color: var(--brutal-red);">OFFLINE</span><br>
            STRICT MODE: ADIPOSITY_PENALTY_ON
        </div>
    </header>

    <div class="layout">
        <!-- ФОТО -->
        <div class="panel">
            <div class="panel-header">Сенсор (Input)</div>
            <div class="panel-content">
                <div class="workspace">
                    <span id="placeholder" style="font-size: 0.8rem; color: #444; text-align: center;">[ ОЖИДАНИЕ ИНИЦИАЛИЗАЦИИ ]</span>
                    <div class="img-container" id="imgContainer" style="display: none;">
                        <img id="targetImage" alt="Target">
                        <canvas id="overlay"></canvas>
                    </div>
                </div>
                <div style="position: relative;">
                    <button class="btn" id="uploadBtn" disabled>[ ЗАГРУЗИТЬ БИОМЕТРИЮ ]</button>
                    <input type="file" id="imageLoader" accept="image/jpeg, image/png, image/webp" style="position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;" disabled>
                </div>
            </div>
        </div>

        <!-- ТЕРМИНАЛ -->
        <div class="panel">
            <div class="panel-header">Консоль (RAW LOGS)</div>
            <div class="panel-content" style="background: #000;">
                <div class="terminal" id="terminal"></div>
                <div class="cursor" id="termCursor"></div>
            </div>
        </div>

        <!-- МЕТРИКИ -->
        <div class="panel right-panel">
            <div class="panel-header">Клинический Вердикт</div>
            <div class="panel-content">
                <div id="metricsOutput">
                    <div style="color:#333; text-align:center; margin-top: 50px;">Awaiting facial scan...</div>
                </div>
                <div class="final-score" id="finalScoreBox" style="display:none;">
                    <div class="tier-label" id="tierLabel">UNKNOWN</div>
                    <div class="score-val" id="scoreVal" style="color: #fff;">0.0 <span style="font-size:1rem; color:#444;">/ 10</span></div>
                    <div class="score-desc" id="scoreDesc">...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const targetImage = document.getElementById('targetImage');
        const overlay = document.getElementById('overlay');
        const imgContainer = document.getElementById('imgContainer');
        const placeholder = document.getElementById('placeholder');
        const terminal = document.getElementById('terminal');
        const uploadBtn = document.getElementById('uploadBtn');
        const metricsOutput = document.getElementById('metricsOutput');
        const finalScoreBox = document.getElementById('finalScoreBox');
        const sysStatus = document.getElementById('sysStatus');

        let modelsLoaded = false;

        function log(msg, type = 'sys', delay = 0) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const now = new Date();
                    const time = `[${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}:${now.getMilliseconds().toString().padStart(3,'0')}]`;
                    let color = 'term-sys';
                    if(type === 'err') color = 'term-err';
                    if(type === 'warn') color = 'term-warn';
                    if(type === 'plus') color = 'term-plus';
                    
                    const line = document.createElement('div');
                    line.className = 'term-line';
                    line.innerHTML = `<span class="term-time">${time}</span><span class="${color}">${msg}</span>`;
                    terminal.appendChild(line);
                    terminal.parentElement.scrollTop = terminal.parentElement.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        async function initAI() {
            await log('SYSTEM BOOT...', 'sys', 500);
            await log('Загрузка весов нейросети (face-api.js)...', 'warn', 300);
            
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                await log('Библиотеки загружены. Сенсор активен.', 'plus', 600);
                await log('FAT-PENALTY МОДУЛЬ: АКТИВИРОВАН.', 'err', 200);
                
                modelsLoaded = true;
                sysStatus.innerText = "ONLINE";
                sysStatus.style.color = "var(--accent-1)";
                placeholder.innerText = "[ ГОТОВ К ПРИЕМУ ДАННЫХ ]";
                uploadBtn.disabled = false;
                imageLoader.disabled = false;
            } catch (e) {
                await log('FATAL ERROR: Не удалось загрузить модели.', 'err');
            }
        }

        window.addEventListener('load', initAI);

        imageLoader.addEventListener('change', async (e) => {
            if (!modelsLoaded) return;
            const file = e.target.files[0];
            if (!file) return;

            placeholder.style.display = 'none';
            imgContainer.style.display = 'inline-block';
            metricsOutput.innerHTML = '<div style="color:#444; text-align:center; margin-top: 50px;">Processing data...</div>';
            finalScoreBox.style.display = 'none';
            terminal.innerHTML = '';
            
            await log(`Обнаружен файл: ${file.name}. Извлекаю геометрию...`, 'sys', 100);
            const imgURL = URL.createObjectURL(file);
            targetImage.src = imgURL;

            targetImage.onload = async () => {
                overlay.width = targetImage.width;
                overlay.height = targetImage.height;
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                await log('Запуск сканирования мягких тканей и костей...', 'sys', 400);

                const detection = await faceapi.detectSingleFace(targetImage, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

                if (!detection) {
                    await log('CRITICAL: Лицо не найдено. Прекращение работы.', 'err', 200);
                    metricsOutput.innerHTML = '<div style="color:var(--brutal-red); text-align:center; margin-top: 50px;">SCAN FAILED</div>';
                    return;
                }

                const dims = faceapi.matchDimensions(overlay, targetImage, true);
                const resizedResults = faceapi.resizeResults(detection, dims);
                
                const drawOptions = { color: 'rgba(255, 0, 51, 0.5)', lineWidth: 1 };
                const drawBox = new faceapi.draw.DrawFaceLandmarks(resizedResults.landmarks, drawOptions);
                drawBox.draw(overlay);

                setTimeout(() => calculateStrictMetrics(resizedResults.landmarks), 600);
            };
        });

        async function calculateStrictMetrics(landmarks) {
            const points = landmarks.positions;
            const jawLeft = points[0], jawRight = points[16], cheekLeft = points[2], cheekRight = points[14];
            const lowerCheekLeft = points[5], lowerCheekRight = points[11]; // Точки под скулами (buccal area)
            const eyeLeftOuter = points[36], eyeLeftInner = points[39], eyeRightInner = points[42], eyeRightOuter = points[45];
            const nasion = points[27], upperLip = points[51];

            const dist = (p1, p2) => Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
            const angle = (p1, p2) => (Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180) / Math.PI;

            // Вычисления костных пропорций
            const bizygomaticWidth = dist(cheekLeft, cheekRight);
            const upperFacialHeight = dist(nasion, upperLip);
            let fwhrRaw = (bizygomaticWidth / upperFacialHeight).toFixed(2);
            let fwhr = (fwhrRaw * 0.85).toFixed(2); 

            const leftTilt = angle(eyeLeftOuter, eyeLeftInner);
            const rightTilt = angle(eyeRightInner, eyeRightOuter);
            const avgTilt = ((leftTilt + rightTilt) / 2);

            const bigonialWidth = dist(jawLeft, jawRight);
            const jawToCheekRatio = (bigonialWidth / bizygomaticWidth * 100).toFixed(1);

            // РАСЧЕТ ПРОКСИ ЖИРА (Facial Adiposity Bloat Index)
            const buccalWidth = dist(lowerCheekLeft, lowerCheekRight);
            const fatRatio = buccalWidth / bizygomaticWidth; 
            
            // Маппинг коэффициента в примерный % подкожного жира
            let estimatedBF = Math.round(((fatRatio - 0.78) * 130) + 12);
            estimatedBF = Math.min(Math.max(estimatedBF, 9), 38); // Ограничение от 9% до 38%

            await log('--- НАЧАЛО ЖЕСТКОЙ КАЛИБРОВКИ ---', 'sys', 200);

            let baseScore = 4.0; // База среднего человека
            
            // 1. FWHR (Компактность)
            if (fwhr >= 1.9) { 
                baseScore += 1.0; await log(`[+] FWHR ${fwhr}: Идеальный диморфизм кости.`, 'plus', 200); 
            } else if (fwhr >= 1.75) { 
                baseScore += 0.5; await log(`[~] FWHR ${fwhr}: В пределах нормы.`, 'sys', 200); 
            } else {
                baseScore -= 1.5; await log(`[-] FATAL: FWHR ${fwhr}. Вытянутый череп (Long midface). Штраф.`, 'err', 200); 
            }

            // 2. Canthal Tilt (Глаза)
            let tiltDesc = "";
            if (avgTilt > 3) { 
                baseScore += 1.0; tiltDesc = `Hunter (+${avgTilt.toFixed(1)}°)`; await log(`[+] Глаза: Острый Hunter-tilt (+${avgTilt.toFixed(1)}°).`, 'plus', 200); 
            } else if (avgTilt >= 0) { 
                baseScore += 0; tiltDesc = `Neutral (+${avgTilt.toFixed(1)}°)`; await log(`[~] Глаза: Нейтральный разрез.`, 'sys', 200); 
            } else { 
                baseScore -= 1.5; tiltDesc = `Prey (${avgTilt.toFixed(1)}°)`; await log(`[-] FATAL: Отрицательный наклон глаз. Взгляд жертвы. Штраф.`, 'err', 200); 
            }

            // 3. Челюсть к скулам
            if (jawToCheekRatio >= 88) { 
                baseScore += 1.5; await log(`[+] Челюсть: ${jawToCheekRatio}%. Массивная кость.`, 'plus', 200); 
            } else if (jawToCheekRatio >= 82) { 
                baseScore += 0.5; await log(`[~] Челюсть: ${jawToCheekRatio}%. Среднее развитие.`, 'sys', 200); 
            } else {
                baseScore -= 2.0; await log(`[-] FATAL: Слабая нижняя треть (${jawToCheekRatio}%). Ретрузия.`, 'err', 200); 
            }

            // 4. ОЦЕНКА И ШТРАФ ЗА ЖИР (BLOATPILL MODULE)
            await log(`Сканирование подкожно-жировой клетчатки...`, 'warn', 300);
            let bfDesc = `${estimatedBF}%`;
            
            if (estimatedBF <= 13) {
                baseScore += 0.5; 
                bfDesc += " [Lean / Изрезанный]";
                await log(`[+] Жир: ${estimatedBF}%. Экстремально низкий процент. Выраженность костной структуры максимальна.`, 'plus', 300);
            } else if (estimatedBF <= 17) {
                bfDesc += " [Optimal]";
                await log(`[~] Жир: ${estimatedBF}%. Оптимальный баланс. Рельеф лица не нарушен.`, 'sys', 300);
            } else if (estimatedBF <= 22) {
                baseScore -= 0.5;
                bfDesc += " [Puffy / Отекший]";
                await log(`[-] Жир: ${estimatedBF}%. Лицо заплывает (Bloat). Костный рельеф начинает сглаживаться. Штраф -0.5.`, 'warn', 300);
            } else if (estimatedBF <= 26) {
                baseScore -= 1.5;
                bfDesc += " [High Bloat]";
                await log(`[-] FATAL: Жир ${estimatedBF}%. Высокая адипозность. Скулы и челюсть полностью скрыты жировыми пакетами. Штраф -1.5.`, 'err', 300);
            } else {
                baseScore -= 2.5;
                bfDesc += " [Obese Bloat]";
                await log(`[-] CRITICAL OVER: Жир ${estimatedBF}%. Лицо потеряло маскулинную геометрию. Тотальный штраф -2.5.`, 'err', 300);
            }

            // Итоговый загон в рамки PSL
            let finalPsl = Math.min(Math.max(baseScore, 1.5), 9.0).toFixed(1);

            let tier = "SUB-5 (OVER)";
            let color = "var(--brutal-red)";
            let desc = "Генетический тупик или критический избыток жира. Костная структура разрушена. Рекомендация: дефицит калорий (кардиоселл) или радикальный ЧЛХ-хардмакс.";

            if (finalPsl >= 8.0) { 
                tier = "CHAD"; color = "var(--accent-1)"; 
                desc = "Генетическая элита (Топ 1%). Безупречная лепка костей, помноженная на идеальный процент жира. Жизнь на легком уровне."; 
            } else if (finalPsl >= 6.5) { 
                tier = "CHADLITE"; color = "var(--chad-gold)"; 
                desc = "Топ 15%. Отличная база. Если процент жира высок — сгонка до 10% мгновенно выведет в тир Чада."; 
            } else if (finalPsl >= 5.5) { 
                tier = "HTN (HIGH NORMIE)"; color = "#88cc00"; 
                desc = "Выше среднего. Крепкий базис. Рекомендуется сушка, чтобы проявить углы челюсти и убрать щеки."; 
            } else if (finalPsl >= 4.5) { 
                tier = "MTN (MID NORMIE)"; color = "var(--normie-gray)"; 
                desc = "Абсолютная массовка. Лицо без дефектов, но плоское и невыразительное. При высоком жире полностью сливается с толпой."; 
            } else if (finalPsl >= 3.5) {
                tier = "LTN (LOW NORMIE)"; color = "#ff5500"; 
                desc = "Ниже среднего. Выраженные недостатки в костях лица, усугубленные лишним весом. Требуется жесткая работа над собой.";
            }

            // Вывод в UI панель результатов
            metricsOutput.innerHTML = `
                <div class="metric-row"><span>Midface (FWHR)</span><span class="metric-val" style="color:${fwhr < 1.6 ? 'var(--brutal-red)' : '#fff'}">${fwhr}</span></div>
                <div class="metric-row"><span>Canthal Tilt</span><span class="metric-val" style="color:${avgTilt < 0 ? 'var(--brutal-red)' : '#fff'}">${tiltDesc}</span></div>
                <div class="metric-row"><span>Gonial/Zygomatic</span><span class="metric-val" style="color:${jawToCheekRatio < 82 ? 'var(--brutal-red)' : '#fff'}">${jawToCheekRatio}%</span></div>
                <div class="metric-row"><span>Body Fat Proxy</span><span class="metric-val" style="color:${estimatedBF >= 22 ? 'var(--brutal-red)' : (estimatedBF <= 13 ? 'var(--accent-1)' : '#fff')}">${bfDesc}</span></div>
            `;

            document.getElementById('tierLabel').innerText = tier;
            document.getElementById('tierLabel').style.color = color;
            document.getElementById('finalScoreBox').style.borderColor = color;
            document.getElementById('scoreVal').innerHTML = `${finalPsl} <span style="font-size:1rem; color:#444;">/ 10 PSL</span>`;
            document.getElementById('scoreDesc').innerText = desc;
            
            finalScoreBox.style.display = 'block';
            await log(`>>> ИТОГОВАЯ ОЦЕНКА: ${finalPsl} PSL.`, 'sys', 300);
            await log(`>>> ВЕРДИКТ: ${tier} <<<`, 'warn', 100);
        }
    </script>
</body>
</html>
