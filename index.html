<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C# & JS Hardcore Test (150 вопросов)</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent: #58a6ff;
            --success: #3fb950;
            --error: #f85149;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: var(--card-bg); width: 100%; max-width: 700px; border-radius: var(--border-radius); padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid #30363d; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 15px; font-weight: 600; color: #8b949e; }
        .progress-bar-container { width: 100%; background-color: #21262d; height: 8px; border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--accent); width: 0%; transition: width 0.3s ease; }
        
        .question-box { font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; line-height: 1.5; color: #e6edf3; }
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        
        .option-btn { background-color: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 15px; text-align: left; color: var(--text-color); font-size: 1rem; cursor: pointer; transition: all 0.2s ease; display: block; width: 100%; word-break: break-word; font-family: Consolas, monospace; }
        .option-btn:hover:not([disabled]) { background-color: #30363d; border-color: #8b949e; }
        
        .option-btn.correct { background-color: rgba(63, 185, 80, 0.15) !important; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .option-btn.incorrect { background-color: rgba(248, 81, 73, 0.15) !important; border-color: var(--error) !important; color: var(--error); }
        
        .explanation-box { background-color: #0d1117; border-left: 4px solid var(--accent); border-radius: 6px; padding: 15px; margin-bottom: 20px; display: none; line-height: 1.5; font-size: 0.95rem; }
        .explanation-box.show { display: block; animation: fadeIn 0.4s ease; }
        .explanation-box code { background: #21262d; padding: 2px 6px; border-radius: 4px; font-family: Consolas, monospace; color: #ff7b72; }
        
        .next-btn, .restart-btn { background-color: var(--success); color: #ffffff; border: none; padding: 14px 24px; font-size: 1.05rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: opacity 0.2s; }
        .next-btn:hover, .restart-btn:hover { opacity: 0.9; }
        
        .results-screen { text-align: center; display: none; }
        .results-screen h2 { color: var(--accent); margin-bottom: 15px; font-size: 2rem; }
        .score-text { font-size: 3rem; font-weight: bold; margin-bottom: 20px; color: #e6edf3; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <div class="header">
            <span id="question-counter">Вопрос 1 / 150</span>
            <span id="score-counter">Счёт: 0</span>
        </div>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="question-text" class="question-box">Загрузка...</div>
        <div id="options-container" class="options-list"></div>
        <div id="explanation" class="explanation-box"></div>
        <button id="next-button" class="next-btn" style="display: none;">Продолжить</button>
    </div>

    <div id="results-screen" class="results-screen">
        <h2>Итоги тестирования</h2>
        <div id="final-score" class="score-text">0 / 150</div>
        <p id="result-comment" style="margin-bottom: 30px; line-height: 1.6; font-size: 1.1rem; color: #8b949e;"></p>
        <button class="restart-btn" onclick="restartQuiz()">Начать заново</button>
    </div>
</div>

    let currentQuestionIndex = 0;
    let score = 0;
    let activeQuestions = [];

    // Безопасный эскейпинг для вывода кода
    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // ИДЕАЛЬНЫЙ АЛГОРИТМ ПЕРЕМЕШИВАНИЯ (Fisher-Yates Shuffle)
    // Гарантирует абсолютный рандом без предсказуемых паттернов
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // Генерация 5 вариантов (1 правильный + 4 дистрактора) с идеальным перемешиванием
    function generateFiveOptions(currentQ) {
        let optionsSet = new Set();
        optionsSet.add(currentQ.a);

        // Собираем дистракторы из той же категории
        let sameCategoryPool = questionsDB
            .filter(item => item.c === currentQ.c && item.a !== currentQ.a)
            .map(item => item.a);
            
        // Если не хватит из одной категории, берем запасной пул
        let fallbackPool = questionsDB
            .filter(item => item.a !== currentQ.a)
            .map(item => item.a);

        // Перемешиваем пулы перед выборкой
        sameCategoryPool = shuffleArray(sameCategoryPool);
        fallbackPool = shuffleArray(fallbackPool);

        for (let ans of sameCategoryPool) {
            if (optionsSet.size >= 5) break;
            optionsSet.add(ans);
        }
        for (let ans of fallbackPool) {
            if (optionsSet.size >= 5) break;
            optionsSet.add(ans);
        }

        // Превращаем Set в массив и еще раз пропускаем через Fisher-Yates, 
        // чтобы правильный ответ всегда прыгал по разным местам
        return shuffleArray(Array.from(optionsSet));
    }

    function loadQuestion() {
        if (currentQuestionIndex >= activeQuestions.length) {
            showResults();
            return;
        }

        const currentQ = activeQuestions[currentQuestionIndex];
        
        document.getElementById('question-counter').innerText = `Вопрос ${currentQuestionIndex + 1} / ${activeQuestions.length}`;
        document.getElementById('score-counter').innerText = `Счёт: ${score}`;
        document.getElementById('progress-bar').style.width = `${((currentQuestionIndex) / activeQuestions.length) * 100}%`;

        document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${currentQ.q}`;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        const explanationBox = document.getElementById('explanation');
        explanationBox.classList.remove('show');
        document.getElementById('next-button').style.display = 'none';

        // Получаем идеально перемешанные варианты ответов
        const options = generateFiveOptions(currentQ);

        options.forEach(option => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerHTML = escapeHtml(option);
            button.onclick = () => handleAnswerSelect(button, option, currentQ.a, currentQ.c);
            optionsContainer.appendChild(button);
        });
    }

    function getTechName(category) {
        if (category.startsWith('js')) return "JavaScript";
        if (category.startsWith('cs')) return "C# / .NET";
        return "Программирование";
    }

    function handleAnswerSelect(selectedBtn, chosenAnswer, correctAnswer, category) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true); 

        const isCorrect = (chosenAnswer === correctAnswer);
        
        if (isCorrect) {
            selectedBtn.classList.add('correct');
            score++;
            document.getElementById('score-counter').innerText = `Счёт: ${score}`;
        } else {
            selectedBtn.classList.add('incorrect');
            buttons.forEach(btn => {
                if (btn.innerHTML === escapeHtml(correctAnswer) || btn.innerText === correctAnswer) {
                    btn.classList.add('correct');
                }
            });
        }

        const explanationBox = document.getElementById('explanation');
        const techName = getTechName(category);
        
        if (isCorrect) {
            explanationBox.innerHTML = `<strong style="color:var(--success)">✅ Абсолютно верно!</strong><br>В языке <b>${techName}</b> применяется конструкция <code>${escapeHtml(correctAnswer)}</code>.`;
        } else {
            explanationBox.innerHTML = `<strong style="color:var(--error)">❌ Ошибка.</strong><br>Твой выбор: <code>${escapeHtml(chosenAnswer)}</code>.<br>Правильно для <b>${techName}</b>: <code>${escapeHtml(correctAnswer)}</code>.`;
        }
        explanationBox.classList.add('show');

        const nextBtn = document.getElementById('next-button');
        nextBtn.style.display = 'block';
        nextBtn.focus();
    }

    document.getElementById('next-button').onclick = () => {
        currentQuestionIndex++;
        loadQuestion();
    };

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        const resultsScreen = document.getElementById('results-screen');
        resultsScreen.style.display = 'block';
        
        document.getElementById('final-score').innerText = `${score} / ${activeQuestions.length}`;
        
        const percent = (score / activeQuestions.length) * 100;
        let comment = '';
        if (percent === 100) comment = 'Идеально! Архитектор 80 уровня. Vibe coding пройдет успешно! 💻🔥';
        else if (percent >= 85) comment = 'Шикарный результат! Ты отлично понимаешь логику JS и ООП в C#. 🚀';
        else if (percent >= 60) comment = 'Хорошая база, но в некоторых методах и синтаксисе есть путаница. Повтори коллекции и события. 👍';
        else comment = 'Это был очень сложный тест. Рекомендую прогнать его еще пару раз для полного закрепления базы!';
        
        document.getElementById('result-comment').innerText = comment;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        // Создаем свежую копию массива и жестко её тасуем
        activeQuestions = shuffleArray([...questionsDB]);
        loadQuestion();
    }

    // Инициализация при первом запуске
    activeQuestions = shuffleArray([...questionsDB]);
    loadQuestion();
