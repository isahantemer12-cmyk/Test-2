<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT & WinForms Mega Test</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --card-bg: #252538;
            --text-color: #cdd6f4;
            --accent: #89b4fa;
            --success: #a6e3a1;
            --error: #f38ba8;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: var(--card-bg); width: 100%; max-width: 650px; border-radius: var(--border-radius); padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #313244; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #313244; padding-bottom: 15px; }
        .progress-bar-container { width: 100%; background-color: #313244; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--accent); width: 0%; transition: width 0.3s ease; }
        
        .question-box { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        
        .option-btn { background-color: #313244; border: 2px solid transparent; border-radius: 8px; padding: 14px; text-align: left; color: var(--text-color); font-size: 1rem; cursor: pointer; transition: all 0.2s ease; display: block; width: 100%; word-break: break-word; }
        .option-btn:hover:not([disabled]) { background-color: #45475a; border-color: var(--accent); }
        
        .option-btn.correct { background-color: rgba(166, 227, 161, 0.2) !important; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .option-btn.incorrect { background-color: rgba(243, 139, 168, 0.2) !important; border-color: var(--error) !important; color: var(--error); }
        
        .explanation-box { background-color: #11111b; border-left: 4px solid var(--accent); border-radius: 4px; padding: 15px; margin-bottom: 20px; display: none; line-height: 1.5; }
        .explanation-box.show { display: block; animation: fadeIn 0.4s ease; }
        
        .next-btn, .restart-btn { background-color: var(--accent); color: #11111b; border: none; padding: 12px 24px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: opacity 0.2s; }
        .next-btn:hover, .restart-btn:hover { opacity: 0.9; }
        
        .results-screen { text-align: center; display: none; }
        .results-screen h2 { color: var(--accent); margin-bottom: 15px; }
        .score-text { font-size: 2rem; font-weight: bold; margin-bottom: 20px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <div class="header">
            <span id="question-counter">Вопрос 1 из 100</span>
            <span id="score-counter">Очки: 0</span>
        </div>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="question-text" class="question-box">Загрузка вопроса...</div>
        <div id="options-container" class="options-list"></div>
        <div id="explanation" class="explanation-box"></div>
        <button id="next-button" class="next-btn" style="display: none;">Следующий вопрос</button>
    </div>

    <div id="results-screen" class="results-screen">
        <h2>Тестирование завершено!</h2>
        <div id="final-score" class="score-text">0 / 100</div>
        <p id="result-comment" style="margin-bottom: 25px; line-height: 1.6;"></p>
        <button class="restart-btn" onclick="restartQuiz()">Пройти заново</button>
    </div>
</div>

<script>
    // Все 100 вопросов с разбиением на категории для умной генерации вариантов
    const rawQuestions = [
        { c: "web", q: "Какой тег задаёт заголовок первого уровня?", a: "<h1>" },

        { c: "web", q: "Какой тег задаёт абзац текста?", a: "<p>" },
        { c: "web", q: "Как открывается блок PHP-кода?", a: "<?php" },
        { c: "web", q: "Какое ключевое слово объявляет константу в JavaScript?", a: "const" },
        { c: "web", q: "За что в первую очередь отвечает CSS?", a: "За внешний вид страницы" },
        { c: "web", q: "Какие операторы выводят текст в PHP?", a: "echo, print" },
        { c: "web", q: "Как вывести сообщение в консоль браузера?", a: "console.log()" },
        { c: "web", q: "Какой тег создаёт гиперссылку?", a: "<a>" },
        { c: "web", q: "Какой тип данных хранит целые числа?", a: "Number" },
        { c: "web", q: "Как подключить внешний JS-файл к HTML-странице?", a: '<script src="file.js">' },
        { c: "web", q: "Какой атрибут тега <a> указывает адрес ссылки?", a: "href" },
        { c: "web", q: "Какой тип данных хранит значения true/false?", a: "Boolean" },
        { c: "web", q: "Какое значение в JS обозначает намеренное отсутствие значения?", a: "null" },
        { c: "web", q: "Какой тег вставляет изображение на страницу?", a: "<img>" },
        { c: "web", q: "Какой оператор означает «строго равно» (значение и тип)?", a: "===" },
        { c: "web", q: "Что вернёт typeof \"hello\" в JavaScript?", a: "string" },
        { c: "web", q: "Какой атрибут тега <img> задаёт альтернативный текст?", a: "alt" },
        { c: "web", q: "Что делает оператор = в PHP?", a: "Присваивает значение" },
        { c: "web", q: "Какой оператор означает «строго равно» в JS?", a: "===" },
        { c: "web", q: "Что обозначает тег <ul>?", a: "Неупорядоченный список" },
        { c: "web", q: "Какая конструкция выбирает один из нескольких вариантов по значению?", a: "switch" },
        { c: "web", q: "Как объявить массив в JavaScript?", a: "[]" },
        { c: "web", q: "Какой тег обозначает отдельный элемент списка?", a: "<li>" },
        { c: "web", q: "Какой CSS-селектор обращается к элементу по классу?", a: ".class" },
        { c: "web", q: "Какой цикл удобнее всего, когда число повторений известно заранее?", a: "for" },
        { c: "web", q: "Как обратиться к первому элементу массива arr?", a: "arr[0]" },
        { c: "web", q: "Какой CSS-селектор обращается к элементу по идентификатору id?", a: "#id" },
        { c: "web", q: "Какой цикл специально предназначен для перебора массивов?", a: "for...of" },
        { c: "web", q: "Какое свойство возвращает количество элементов массива?", a: "length" },
        { c: "web", q: "Какое свойство CSS задаёт цвет текста?", a: "color" },
        { c: "web", q: "Как можно объявить массив в PHP?", a: "array() или []" },
        { c: "web", q: "Какой метод добавляет элемент в конец массива?", a: "push()" },
        { c: "web", q: "Какое свойство CSS задаёт цвет фона?", a: "background-color" },
        { c: "web", q: "Как обратиться к первому элементу индексного массива $a?", a: "$a[0]" },
        { c: "web", q: "Как объявить объект в JavaScript?", a: "let obj = {};" },
        { c: "web", q: "Какое свойство задаёт внутренний отступ (внутри элемента)?", a: "padding" },
        { c: "web", q: "Какая функция возвращает количество элементов массива?", a: "count()" },
        { c: "web", q: "Как обратиться к свойству name объекта obj?", a: "obj.name" },
        { c: "web", q: "Какое свойство задаёт внешний отступ (вокруг элемента)?", a: "margin" },
        { c: "web", q: "Как правильно объявляется функция в PHP?", a: "function test(){}" },
        { c: "web", q: "Что такое DOM?", a: "Объектная модель документа" },
        { c: "web", q: "Что входит в блочную модель (Box Model)?", a: "content, padding, border, margin" },
        { c: "web", q: "Какое ключевое слово возвращает значение из функции?", a: "return" },
        { c: "web", q: "Какой метод находит элемент по его id?", a: "getElementById()" },
        { c: "web", q: "Какое значение свойства display включает Flexbox?", a: "flex" },
        { c: "web", q: "Какая функция возвращает длину строки?", a: "strlen()" },
        { c: "web", q: "Какой метод находит первый элемент по CSS-селектору?", a: "querySelector()" },
        { c: "web", q: "Какое свойство Flexbox выравнивает элементы по главной оси?", a: "justify-content" },
        { c: "web", q: "Какое свойство задаёт направление флекс-контейнера?", a: "flex-direction" },
        { c: "web", q: "Какая функция переводит строку в верхний регистр?", a: "toUpperCase()" },
        { c: "web", q: "Какое свойство меняет HTML-содержимое элемента?", a: "innerHTML" },
        { c: "web", q: "Какой атрибут формы задаёт адрес отправки данных?", a: "action" },
        { c: "web", q: "Каким методом форма передаёт данные скрыто (не через адресную строку)?", a: "POST" },
        { c: "web", q: "Какой метод создаёт новый элемент в DOM?", a: "createElement()" },
        { c: "web", q: "Какое свойство задаёт колонки в CSS Grid?", a: "grid-template-columns" },
        { c: "web", q: "Как получить данные формы, отправленные методом POST?", a: "$_POST" },
        { c: "web", q: "Какой метод добавляет дочерний элемент в конец родителя?", a: "appendChild()" },
        { c: "web", q: "Для чего используются медиа-запросы (media queries)?", a: "Для адаптивного дизайна" },
        { c: "web", q: "Как расшифровывается SQL?", a: "Structured Query Language" },
        { c: "web", q: "Какой метод назначает обработчик события элементу?", a: "addEventListener()" },
        { c: "web", q: "С чего начинается медиа-запрос в CSS?", a: "@media" },
        { c: "web", q: "Какая SQL-команда выбирает (читает) данные?", a: "SELECT" },
        { c: "web", q: "Какое имя у события щелчка мышью?", a: "click" },
        { c: "web", q: "Какой тег обозначает «шапку» сайта?", a: "<header>" },
        { c: "web", q: "Какая SQL-команда добавляет новые данные?", a: "INSERT" },
        { c: "web", q: "С какого ключевого слова начинается объявление функции в JS?", a: "function" },
        { c: "web", q: "Какой тег предназначен для блока навигации?", a: "<nav>" },
        { c: "web", q: "Какая SQL-команда изменяет существующие данные?", a: "UPDATE" },
        { c: "web", q: "Что делает оператор return в функции?", a: "Возвращает значение" },
        { c: "web", q: "Какой тег обозначает «подвал» сайта?", a: "<footer>" },
        { c: "web", q: "Какая SQL-команда удаляет данные из таблицы?", a: "DELETE" },
        { c: "web", q: "Какой цикл выполняется заранее известное число раз?", a: "for" },
        { c: "web", q: "Какие расширения PHP используются для работы с MySQL?", a: "mysqli, PDO" },
        { c: "web", q: "Какое свойство задаёт размер шрифта?", a: "font-size" },
        { c: "web", q: "Как расшифровывается аббревиатура CRUD?", a: "Create Read Update Delete" },
        { c: "web", q: "Как записать однострочный комментарий в JavaScript?", a: "//" },
        { c: "web", q: "Какое свойство задаёт жирность шрифта?", a: "font-weight" },
        { c: "web", q: "Какой оператор объединяет (склеивает) строки в PHP?", a: "." },
        { c: "cs", q: "Как создать новую форму в проекте Windows Forms приложения в C#?", a: "Add → Windows Form" },
        { c: "cs", q: "Как добавить кнопку на форму в Windows Forms приложении во время проектирования интерфейса?", a: "Перетащить Button из Toolbox" },
        { c: "cs", q: "Как связать событие Click кнопки с обработчиком события в коде C#?", a: "Двойной щелчок по кнопке" },
        { c: "cs", q: "Как изменить текст кнопки программно в коде C#?", a: "button1.Text = \"Текст\";" },
        { c: "cs", q: "Как добавить текстовое поле (TextBox) на форму в Windows Forms приложении во время проектирования интерфейса?", a: "Перетащить TextBox из Toolbox" },
        { c: "cs", q: "Как установить начальное значение для текстового поля (TextBox) программно в коде C#?", a: "textBox1.Text = \"Текст\";" },
        { c: "cs", q: "Как добавить элемент выпадающего списка (ComboBox) на форму в Windows Forms приложении во время проектирования интерфейса?", a: "Перетащить ComboBox из Toolbox" },
        { c: "cs", q: "Как заполнить элемент выпадающего списка (ComboBox) данными программно в коде C#?", a: "comboBox1.Items.Add(...)" },
        { c: "cs", q: "Как установить изображение для элемента PictureBox на форме в C#?", a: "pictureBox1.Image = Image.FromFile(...)" },
        { c: "cs", q: "Как добавить элемент управления ListBox на форму в Windows Forms приложении во время проектирования интерфейса?", a: "Перетащить ListBox из Toolbox" },
        { c: "cs", q: "Как установить цвет фона для формы в C#?", a: "this.BackColor = Color.Red;" },
        { c: "cs", q: "Как добавить элемент управления DateTimePicker на форму в Windows Forms приложении во время проектирования интерфейса?", a: "Перетащить DateTimePicker из Toolbox" },
        { c: "cs", q: "Как установить текущую дату и время для элемента DateTimePicker в C#?", a: "dateTimePicker1.Value = DateTime.Now;" },
        { c: "cs", q: "Как включить режим множественного выбора для элемента управления ListBox в C#?", a: "SelectionMode = MultiExtended" },
        { c: "cs", q: "Как добавить элемент управления TrackBar на форму в Windows Forms приложении во время проектирования интерфейса?", a: "Перетащить TrackBar из Toolbox" },
        { c: "cs", q: "Как добавить элемент управления RadioButton на форму в Windows Forms приложении во время проектирования интерфейса?", a: "Перетащить RadioButton из Toolbox" },
        { c: "cs", q: "Как установить текст для элемента управления Label в C#?", a: "label1.Text = \"Текст\";" },
        { c: "cs", q: "Как связать элемент управления CheckBox с переменной в C#?", a: "checkBox1.Checked" },
        { c: "cs", q: "Как скрыть элемент управления на форме в C#?", a: "Visible = false" },
        { c: "cs", q: "Как закрыть форму программно в C#?", a: "this.Close();" }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptions = [];

    // Безопасное экранирование HTML тегов для вывода в текст кнопок
    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Генерация 5 вариантов (1 правильный + 4 дистрактора)
    function generateFiveOptions(currentQ) {
        let optionsSet = new Set();
        optionsSet.add(currentQ.a);

        // Фильтруем пул ответов из той же категории, чтобы варианты были логичными
        let sameCategoryPool = rawQuestions.filter(item => item.c === currentQ.c && item.a !== currentQ.a).map(item => item.a);
        let fallbackPool = rawQuestions.filter(item => item.a !== currentQ.a).map(item => item.a);

        // Перемешиваем пулы
        sameCategoryPool.sort(() => Math.random() - 0.5);
        fallbackPool.sort(() => Math.random() - 0.5);

        // Пытаемся заполнить из родной категории
        for (let ans of sameCategoryPool) {
            if (optionsSet.size >= 5) break;
            optionsSet.add(ans);
        }
        // Если не набралось 5, берем из общего котла
        for (let ans of fallbackPool) {
            if (optionsSet.size >= 5) break;
            optionsSet.add(ans);
        }

        let finalOptions = Array.from(optionsSet);
        return finalOptions.sort(() => Math.random() - 0.5); // окончательный хаотичный заброс
    }

    function loadQuestion() {
        const quizScreen = document.getElementById('quiz-screen');
        const resultsScreen = document.getElementById('results-screen');
        
        if (currentQuestionIndex >= rawQuestions.length) {
            showResults();
            return;
        }

        // Обновление интерфейса верхних счетчиков
        document.getElementById('question-counter').innerText = `Вопрос ${currentQuestionIndex + 1} из ${rawQuestions.length}`;
        document.getElementById('score-counter').innerText = `Очки: ${score}`;
        document.getElementById('progress-bar').style.width = `${((currentQuestionIndex) / rawQuestions.length) * 100}%`;

        const currentQ = rawQuestions[currentQuestionIndex];
        document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${currentQ.q}`;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        const explanationBox = document.getElementById('explanation');
        explanationBox.classList.remove('show');
        document.getElementById('next-button').style.display = 'none';

        // Генерируем опции для текущего вопроса
        const options = generateFiveOptions(currentQ);

        options.forEach(option => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerHTML = escapeHtml(option);
            button.onclick = () => handleAnswerSelect(button, option, currentQ.a);
            optionsContainer.appendChild(button);
        });
    }

    function handleAnswerSelect(selectedBtn, chosenAnswer, correctAnswer) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true); // Блокируем клики по остальным кнопкам

        const isCorrect = (chosenAnswer === correctAnswer);
        
        if (isCorrect) {
            selectedBtn.classList.add('correct');
            score++;
            document.getElementById('score-counter').innerText = `Очки: ${score}`;
        } else {
            selectedBtn.classList.add('incorrect');
            // Подсвечиваем верный вариант, чтобы юзер сразу запоминал
            buttons.forEach(btn => {
                if (btn.innerText === correctAnswer || btn.innerHTML === escapeHtml(correctAnswer)) {
                    btn.classList.add('correct');
                }
            });
        }

        // Вывод подробного пояснения
        const explanationBox = document.getElementById('explanation');
        let techType = rawQuestions[currentQuestionIndex].c === 'web' ? 'Веб-технологии / Архитектура' : 'C# Windows Forms';
        
        if (isCorrect) {
            explanationBox.innerHTML = `🟢 <strong>Верно!</strong><br>Конструкция <code>${escapeHtml(correctAnswer)}</code> — это абсолютно точный ответ на данный вопрос в рамках дисциплины "${techType}".`;
        } else {
            explanationBox.innerHTML = `🔴 <strong>Неверно.</strong><br>Правильный ответ: <code>${escapeHtml(correctAnswer)}</code>.<br>Твой выбор (<code>${escapeHtml(chosenAnswer)}</code>) не решает поставленную в вопросе задачу согласно спецификации "${techType}".`;
        }
        explanationBox.classList.add('show');

        document.getElementById('next-button').style.display = 'block';
    }

    document.getElementById('next-button').onclick = () => {
        currentQuestionIndex++;
        loadQuestion();
    };

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        const resultsScreen = document.getElementById('results-screen');
        resultsScreen.style.display = 'block';
        
        document.getElementById('final-score').innerText = `${score} / ${rawQuestions.length}`;
        
        const percent = (score / rawQuestions.length) * 100;
        let comment = '';
        if (percent === 100) comment = 'Идеально! Полное знание всей базы веб-технологий и C#! 🚀';
        else if (percent >= 85) comment = 'Отличный результат! Большинство модулей пройдены без проблем.🔥';
        else if (percent >= 50) comment = 'Хорошо, но стоит повторить синтаксис PHP и методы вызова событий в WinForms. 👍';
        else comment = 'Нужно еще раз внимательно пройтись по ответам. Попробуй заново!';
        
        document.getElementById('result-comment').innerText = comment;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        // Перемешаем массив вопросов, чтобы при каждом перезапуске порядок менялся
        rawQuestions.sort(() => Math.random() - 0.5);
        loadQuestion();
    }

    // Первый запуск
    rawQuestions.sort(() => Math.random() - 0.5);
    loadQuestion();
</script>

</body>
</html>
