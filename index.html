<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Blackpill Terminal</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        :root {
            --bg-base: #030303;
            --panel-bg: #0a0a0a;
            --border-dim: #1a1a1a;
            --border-focus: #333;
            --text-main: #c0c0c0;
            --accent-1: #00ffcc;
            --chad-gold: #ffb700;
            --brutal-red: #ff0033;
            --normie-gray: #888888;
            --font-mono: 'Courier New', Courier, monospace;
            --font-ui: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { font-size: 1.4rem; color: var(--brutal-red); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,0,51,0.3); }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 20px;
            height: calc(100vh - 80px);
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 350px 1fr; }
            .right-panel { grid-column: 1 / -1; }
        }
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; height: auto; }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #050505;
            padding: 8px 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #555;
            border-bottom: 1px solid var(--border-dim);
            font-family: var(--font-mono);
        }

        .panel-content { padding: 15px; overflow-y: auto; flex: 1; }

        .workspace {
            position: relative;
            width: 100%;
            background: #000;
            border: 1px dashed var(--border-focus);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        #targetImage { max-width: 100%; height: auto; display: block; filter: grayscale(20%) contrast(110%); }
        canvas#overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

        .btn {
            background: transparent;
            border: 1px solid var(--border-focus);
            color: var(--text-main);
            padding: 12px;
            font-family: var(--font-mono);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }
        .btn:hover:not(:disabled) { border-color: var(--brutal-red); color: var(--brutal-red); box-shadow: inset 0 0 10px rgba(255,0,51,0.2); }
        .btn:disabled { border-color: #222; color: #444; cursor: not-allowed; }

        .terminal { font-family: var(--font-mono); font-size: 0.8rem; color: #888; line-height: 1.4; }
        .term-line { margin-bottom: 6px; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .term-time { color: #444; margin-right: 8px; }
        .term-sys { color: #aaa; }
        .term-err { color: var(--brutal-red); font-weight: bold; }
        .term-warn { color: var(--chad-gold); }
        .term-plus { color: var(--accent-1); }

        .metric-row { display: flex; justify-content: space-between; border-bottom: 1px dotted #222; padding: 8px 0; font-size: 0.85rem;}
        .metric-val { color: #fff; font-weight: bold; font-family: var(--font-mono);}

        .final-score { margin-top: 20px; padding: 20px; background: #050505; border: 1px solid var(--border-dim); text-align: center; }
        .tier-label { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; }
        .score-val { font-size: 2.5rem; font-family: var(--font-mono); margin: 10px 0; font-weight: bold; }
        .score-desc { font-size: 0.85rem; color: #888; line-height: 1.5; text-align: left; padding-top: 10px; border-top: 1px solid #222;}
    </style>
</head>
<body>

    <header>
        <h1>Strict PSL Engine</h1>
        <div style="font-family: var(--font-mono); color: #444; font-size: 0.75rem;">Build 4.0 // Uncensored Blackpill Logic</div>
    </header>

    <div class="layout">
        <!-- ФОТО -->
        <div class="panel">
            <div class="panel-header">Сенсор (Input)</div>
            <div class="panel-content">
                <div class="workspace">
                    <span id="placeholder" style="font-family: var(--font-mono); font-size: 0.8rem;">[ Загрузка нейросети ]</span>
                    <div class="img-container" id="imgContainer" style="display: none;">
                        <img id="targetImage" alt="Target">
                        <canvas id="overlay"></canvas>
                    </div>
                </div>
                <div style="position: relative; margin-top: 15px;">
                    <button class="btn" id="uploadBtn" disabled>Загрузить фото</button>
                    <input type="file" id="imageLoader" accept="image/jpeg, image/png, image/webp" style="position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;" disabled>
                </div>
            </div>
        </div>

        <!-- ТЕРМИНАЛ -->
        <div class="panel">
            <div class="panel-header">Консоль (RAW LOGS)</div>
            <div class="panel-content" style="padding: 10px;">
                <div class="terminal" id="terminal"></div>
            </div>
        </div>

        <!-- МЕТРИКИ -->
        <div class="panel right-panel">
            <div class="panel-header">Клинический Вердикт</div>
            <div class="panel-content">
                <div id="metricsOutput">
                    <div style="color:#444; text-align:center; margin-top: 50px; font-family: var(--font-mono);">Awaiting scan...</div>
                </div>
                <div class="final-score" id="finalScoreBox" style="display:none;">
                    <div class="tier-label" id="tierLabel">UNKNOWN</div>
                    <div class="score-val" id="scoreVal" style="color: #fff;">0.0 <span style="font-size:1rem; color:#555;">/ 10</span></div>
                    <div class="score-desc" id="scoreDesc">...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const targetImage = document.getElementById('targetImage');
        const overlay = document.getElementById('overlay');
        const imgContainer = document.getElementById('imgContainer');
        const placeholder = document.getElementById('placeholder');
        const terminal = document.getElementById('terminal');
        const uploadBtn = document.getElementById('uploadBtn');
        const metricsOutput = document.getElementById('metricsOutput');
        const finalScoreBox = document.getElementById('finalScoreBox');

        let modelsLoaded = false;

        function log(msg, type = 'sys') {
            const now = new Date();
            const time = `[${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
            let color = 'term-sys';
            if(type === 'err') color = 'term-err';
            if(type === 'warn') color = 'term-warn';
            if(type === 'plus') color = 'term-plus';
            terminal.innerHTML += `<div class="term-line"><span class="term-time">${time}</span><span class="${color}">${msg}</span></div>`;
            terminal.parentElement.scrollTop = terminal.parentElement.scrollHeight;
        }

        async function initAI() {
            log('Инициализация face-api.js...', 'warn');
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                log('Сенсор активен. Ограничения сняты.', 'sys');
                modelsLoaded = true;
                placeholder.innerText = "[ ОЖИДАНИЕ ДАННЫХ ]";
                uploadBtn.disabled = false;
                imageLoader.disabled = false;
            } catch (e) {
                log('FATAL ERROR: Не удалось загрузить веса.', 'err');
            }
        }

        window.addEventListener('load', initAI);

        imageLoader.addEventListener('change', async (e) => {
            if (!modelsLoaded) return;
            const file = e.target.files[0];
            if (!file) return;

            placeholder.style.display = 'none';
            imgContainer.style.display = 'inline-block';
            metricsOutput.innerHTML = '';
            finalScoreBox.style.display = 'none';
            
            log(`Скан: ${file.name}. Извлекаю геометрию...`, 'sys');
            const imgURL = URL.createObjectURL(file);
            targetImage.src = imgURL;

            targetImage.onload = async () => {
                overlay.width = targetImage.width;
                overlay.height = targetImage.height;

                const detection = await faceapi.detectSingleFace(targetImage, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

                if (!detection) {
                    log('CRITICAL: Лицо не найдено. Прекращение работы.', 'err');
                    return;
                }

                const dims = faceapi.matchDimensions(overlay, targetImage, true);
                const resizedResults = faceapi.resizeResults(detection, dims);
                
                // Рисуем кроваво-красные точки для стиля
                const drawOptions = { color: 'rgba(255, 0, 51, 0.8)', lineWidth: 1 };
                const drawBox = new faceapi.draw.DrawFaceLandmarks(resizedResults.landmarks, drawOptions);
                drawBox.draw(overlay);

                calculateStrictMetrics(resizedResults.landmarks);
            };
        });

        function calculateStrictMetrics(landmarks) {
            const points = landmarks.positions;
            const jawLeft = points[0], jawRight = points[16], cheekLeft = points[2], cheekRight = points[14];
            const eyeLeftOuter = points[36], eyeLeftInner = points[39], eyeRightInner = points[42], eyeRightOuter = points[45];
            const nasion = points[27], upperLip = points[51];

            const dist = (p1, p2) => Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
            const angle = (p1, p2) => (Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180) / Math.PI;

            // Сырые данные
            const bizygomaticWidth = dist(cheekLeft, cheekRight);
            const upperFacialHeight = dist(nasion, upperLip);
            let fwhrRaw = (bizygomaticWidth / upperFacialHeight).toFixed(2);
            let fwhr = (fwhrRaw * 0.85).toFixed(2); 

            const leftTilt = angle(eyeLeftOuter, eyeLeftInner);
            const rightTilt = angle(eyeRightInner, eyeRightOuter);
            const avgTilt = ((leftTilt + rightTilt) / 2);

            const bigonialWidth = dist(jawLeft, jawRight);
            const jawToCheekRatio = (bigonialWidth / bizygomaticWidth * 100).toFixed(1);

            log('--- НАЧАЛО ЖЕСТКОЙ КАЛИБРОВКИ ---', 'warn');

            let baseScore = 4.5; // Базовый старт ниже среднего (строгий стандарт)
            
            // 1. Оценка FWHR (Компактность лица)
            if (fwhr >= 1.85 && fwhr <= 2.1) { 
                baseScore += 1.0; log(`[+] FWHR ${fwhr}: Топ диморфизм, широкое лицо.`, 'plus'); 
            } else if (fwhr >= 1.7) { 
                baseScore += 0.0; log(`[~] FWHR ${fwhr}: Норма, ничего выдающегося.`, 'sys'); 
            } else if (fwhr < 1.6) { 
                baseScore -= 1.5; log(`[-] FATAL: FWHR ${fwhr}. Вытянутое "лошадиное" лицо (Long midface). Жесткий штраф.`, 'err'); 
            } else {
                baseScore -= 0.5; log(`[-] FWHR ${fwhr}: Субоптимально.`, 'warn');
            }

            // 2. Оценка кантального наклона (Глаза)
            let tiltDesc = "";
            if (avgTilt > 3) { 
                baseScore += 1.0; tiltDesc = "Positive (Hunter)"; log(`[+] Eyes: Положительный наклон (${avgTilt.toFixed(1)}°). Хищный взгляд.`, 'plus'); 
            } else if (avgTilt < -2) { 
                baseScore -= 1.5; tiltDesc = "Negative (Prey)"; log(`[-] FATAL: Отрицательный наклон (${avgTilt.toFixed(1)}°). Взгляд жертвы (Prey eyes). Штраф.`, 'err'); 
            } else { 
                baseScore -= 0.2; tiltDesc = "Neutral / Boring"; log(`[-] Eyes: Нейтрально (${avgTilt.toFixed(1)}°). Не выделяется из толпы.`, 'warn'); 
            }

            // 3. Челюсть к скулам (Маскулинность)
            if (jawToCheekRatio >= 88) { 
                baseScore += 1.5; log(`[+] Jaw: Ширина ${jawToCheekRatio}%. Массивная, доминирующая челюсть.`, 'plus'); 
            } else if (jawToCheekRatio >= 80) { 
                baseScore += 0.2; log(`[~] Jaw: Ширина ${jawToCheekRatio}%. В пределах нормы.`, 'sys'); 
            } else if (jawToCheekRatio < 75) { 
                baseScore -= 2.0; log(`[-] FATAL: Jaw ${jawToCheekRatio}%. Слабая нижняя треть, ретрузия / узкая кость.`, 'err'); 
            } else {
                baseScore -= 0.8; log(`[-] Jaw: Ширина ${jawToCheekRatio}%. Недостаток угловатости.`, 'warn');
            }

            // Жесткое ограничение оценки от 2.0 до 9.0
            let finalPsl = Math.min(Math.max(baseScore, 2.0), 9.0).toFixed(1);

            let tier = "SUB-5 (OVER)";
            let color = "var(--brutal-red)";
            let desc = "Полный провал генетической лотереи. Женщины инстинктивно игнорируют. Требуется хардмакс (челюстно-лицевая хирургия) или смирение.";

            if (finalPsl >= 8.0) { 
                tier = "CHAD"; color = "var(--accent-1)"; 
                desc = "Генетическая элита (Топ 1%). Экстремальный диморфизм. Жизнь на легком уровне."; 
            } else if (finalPsl >= 6.5) { 
                tier = "CHADLITE"; color = "var(--chad-gold)"; 
                desc = "Топ 15%. Мощная база, прощает мелкие недостатки. С низким процентом жира легко доминирует."; 
            } else if (finalPsl >= 5.5) { 
                tier = "HTN (High Normie)"; color = "#88cc00"; 
                desc = "Выше среднего. Можно бороться за внимание, но конкуренция высока. Обязателен жесткий луксмакс (груминг, стиль, джимселл)."; 
            } else if (finalPsl >= 4.5) { 
                tier = "MTN (Mid Normie)"; color = "var(--normie-gray)"; 
                desc = "База. Обычная массовка. Кости не развиты для доминации, но и отторжения не вызывают. Невидимый для элитных девушек."; 
            } else if (finalPsl >= 3.5) {
                tier = "BRUTAL LTN"; color = "#ff5500"; 
                desc = "Ниже среднего. Жесткие недостатки в костной структуре. Выживание возможно только через статус или экстремальную компенсацию.";
            }

            metricsOutput.innerHTML = `
                <div class="metric-row"><span>FWHR Ratio</span><span class="metric-val" style="color:${fwhr < 1.7 ? 'var(--brutal-red)' : '#fff'}">${fwhr}</span></div>
                <div class="metric-row"><span>Canthal Tilt</span><span class="metric-val" style="color:${avgTilt < -2 ? 'var(--brutal-red)' : '#fff'}">${tiltDesc}</span></div>
                <div class="metric-row"><span>Jaw/Cheek Ratio</span><span class="metric-val" style="color:${jawToCheekRatio < 80 ? 'var(--brutal-red)' : '#fff'}">${jawToCheekRatio}%</span></div>
            `;

            document.getElementById('tierLabel').innerText = tier;
            document.getElementById('tierLabel').style.color = color;
            document.getElementById('finalScoreBox').style.borderColor = color;
            document.getElementById('scoreVal').innerHTML = `${finalPsl} <span style="font-size:1rem; color:#555;">/ 10 PSL</span>`;
            document.getElementById('scoreDesc').innerText = desc;
            
            finalScoreBox.style.display = 'block';
            log(`>>> ИТОГ: ${finalPsl} PSL. Вердикт: ${tier} <<<`, 'sys');
        }
    </script>
</body>
</html>
