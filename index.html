<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Real Vision Analyzer</title>
    <!-- Подключаем face-api.js через CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        :root {
            --bg-base: #050505;
            --panel-bg: #111111;
            --border-dim: #222;
            --border-focus: #444;
            --text-main: #d0d0d0;
            --accent-1: #00ffcc;
            --accent-2: #ff3366;
            --chad-gold: #ffb700;
            --font-mono: 'Courier New', Courier, monospace;
            --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { font-size: 1.4rem; color: var(--accent-1); text-transform: uppercase; letter-spacing: 2px; }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 20px;
            height: calc(100vh - 80px);
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 350px 1fr; }
            .right-panel { grid-column: 1 / -1; }
        }
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; height: auto; }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #1a1a1a;
            padding: 8px 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #888;
            border-bottom: 1px solid var(--border-dim);
        }

        .panel-content { padding: 15px; overflow-y: auto; flex: 1; }

        .workspace {
            position: relative;
            width: 100%;
            background: #000;
            border: 1px dashed var(--border-focus);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Задаем фиксированный размер контейнеру, чтобы Canvas совпадал с картинкой */
        .img-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        #targetImage {
            max-width: 100%;
            height: auto;
            display: block;
        }

        canvas#overlay {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-1);
            color: var(--accent-1);
            padding: 10px 15px;
            font-family: var(--font-mono);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover:not(:disabled) { background: var(--accent-1); color: #000; }
        .btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }

        .terminal { font-family: var(--font-mono); font-size: 0.85rem; color: #aaa; }
        .term-line { margin-bottom: 4px; }
        .term-time { color: #555; margin-right: 8px; }
        .term-sys { color: var(--accent-1); }
        .term-err { color: var(--accent-2); }
        .term-warn { color: var(--chad-gold); }

        .metric-row { display: flex; justify-content: space-between; border-bottom: 1px dotted #333; padding-bottom: 5px; margin-bottom: 10px; font-size: 0.9rem;}
        .metric-val { color: var(--accent-1); font-weight: bold; font-family: var(--font-mono);}

        .final-score { margin-top: 20px; padding: 15px; background: #151515; border: 1px solid var(--border-dim); text-align: center; }
        .tier-label { font-size: 1.5rem; font-weight: bold; color: var(--accent-1); }
        .score-val { font-size: 2rem; font-family: var(--font-mono); margin: 10px 0; }
    </style>
</head>
<body>

    <header>
        <h1>Real Vision AI Analyzer</h1>
        <div style="font-family: var(--font-mono); color: #666; font-size: 0.8rem;">Build 3.0 // face-api.js Integration</div>
    </header>

    <div class="layout">
        <!-- ФОТО -->
        <div class="panel">
            <div class="panel-header">Сенсор</div>
            <div class="panel-content">
                <div class="workspace">
                    <span id="placeholder">Ожидание инициализации ИИ...</span>
                    <div class="img-container" id="imgContainer" style="display: none;">
                        <img id="targetImage" alt="Target">
                        <canvas id="overlay"></canvas>
                    </div>
                </div>
                <div style="position: relative; margin-top: 15px;">
                    <button class="btn" id="uploadBtn" disabled>Выбрать фото</button>
                    <input type="file" id="imageLoader" accept="image/jpeg, image/png, image/webp" style="position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;" disabled>
                </div>
            </div>
        </div>

        <!-- ТЕРМИНАЛ -->
        <div class="panel">
            <div class="panel-header">Консоль вычислений</div>
            <div class="panel-content" style="padding: 10px;">
                <div class="terminal" id="terminal"></div>
            </div>
        </div>

        <!-- МЕТРИКИ -->
        <div class="panel right-panel">
            <div class="panel-header">Клинические Данные</div>
            <div class="panel-content">
                <div id="metricsOutput">
                    <div style="color:#555; text-align:center; margin-top: 50px;">Нет данных</div>
                </div>
                <div class="final-score" id="finalScoreBox" style="display:none;">
                    <div class="tier-label" id="tierLabel">UNKNOWN</div>
                    <div class="score-val" id="scoreVal">0.0 / 10</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const targetImage = document.getElementById('targetImage');
        const overlay = document.getElementById('overlay');
        const imgContainer = document.getElementById('imgContainer');
        const placeholder = document.getElementById('placeholder');
        const terminal = document.getElementById('terminal');
        const uploadBtn = document.getElementById('uploadBtn');
        const metricsOutput = document.getElementById('metricsOutput');
        const finalScoreBox = document.getElementById('finalScoreBox');

        let modelsLoaded = false;

        function log(msg, type = 'sys') {
            const now = new Date();
            const time = `[${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
            let color = 'term-sys';
            if(type === 'err') color = 'term-err';
            if(type === 'warn') color = 'term-warn';
            terminal.innerHTML += `<div class="term-line"><span class="term-time">${time}</span><span class="${color}">${msg}</span></div>`;
            terminal.parentElement.scrollTop = terminal.parentElement.scrollHeight;
        }

        // Загрузка нейросетей с официального демо репозитория face-api
        async function initAI() {
            log('Инициализация face-api.js...', 'warn');
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                log('Нейросети загружены. Система готова к работе.', 'sys');
                modelsLoaded = true;
                placeholder.innerText = "Система Готова";
                uploadBtn.disabled = false;
                imageLoader.disabled = false;
                uploadBtn.innerText = "Выбрать фото (Желательно анфас)";
            } catch (e) {
                log('Ошибка загрузки моделей ИИ. Проверьте подключение (CORS).', 'err');
                console.error(e);
            }
        }

        // Запускаем инициализацию при загрузке
        window.addEventListener('load', initAI);

        imageLoader.addEventListener('change', async (e) => {
            if (!modelsLoaded) return;
            const file = e.target.files[0];
            if (!file) return;

            // Сброс UI
            placeholder.style.display = 'none';
            imgContainer.style.display = 'inline-block';
            metricsOutput.innerHTML = '';
            finalScoreBox.style.display = 'none';
            
            log(`Загружено: ${file.name}. Анализирую...`, 'sys');

            const imgURL = URL.createObjectURL(file);
            targetImage.src = imgURL;

            targetImage.onload = async () => {
                // Синхронизация Canvas с картинкой
                overlay.width = targetImage.width;
                overlay.height = targetImage.height;

                // Детекция лица
                log('Поиск лица и детекция 68 landmarks...', 'warn');
                const detection = await faceapi.detectSingleFace(targetImage, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

                if (!detection) {
                    log('ЛИЦО НЕ НАЙДЕНО. Загрузите фото лучше, без сильных перекрытий.', 'err');
                    return;
                }

                // Рисуем реальные точки на лице
                log('Лицо найдено. Отрисовка геометрии...', 'sys');
                const dims = faceapi.matchDimensions(overlay, targetImage, true);
                const resizedResults = faceapi.resizeResults(detection, dims);
                faceapi.draw.drawFaceLandmarks(overlay, resizedResults);

                calculateMetrics(resizedResults.landmarks);
            };
        });

        // Математический анализ реальных расстояний
        function calculateMetrics(landmarks) {
            const points = landmarks.positions;

            // Извлекаем нужные точки (согласно документации iBug-68)
            const jawLeft = points[0];
            const jawRight = points[16];
            const cheekLeft = points[2];
            const cheekRight = points[14];
            const eyeLeftOuter = points[36];
            const eyeLeftInner = points[39];
            const eyeRightInner = points[42];
            const eyeRightOuter = points[45];
            const nasion = points[27]; // Переносица
            const upperLip = points[51]; // Верхняя губа

            // Вспомогательная функция для дистанции
            const dist = (p1, p2) => Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
            // Вспомогательная функция для угла
            const angle = (p1, p2) => (Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180) / Math.PI;

            // 1. FWHR (Facial Width to Height Ratio)
            // Ширина: между скулами. Высота: от верхней губы до бровей (упрощаем до переносицы/nasion, так как линия роста волос не трекается в 68pts)
            const bizygomaticWidth = dist(cheekLeft, cheekRight);
            const upperFacialHeight = dist(nasion, upperLip);
            let fwhr = (bizygomaticWidth / upperFacialHeight).toFixed(2);
            // Коррекция fwhr, так как берем от nasion, а не от бровей
            fwhr = (fwhr * 0.85).toFixed(2); 

            // 2. Canthal Tilt (угол глаз)
            const leftTilt = angle(eyeLeftOuter, eyeLeftInner);
            const rightTilt = angle(eyeRightInner, eyeRightOuter);
            const avgTilt = ((leftTilt + rightTilt) / 2);
            let tiltDesc = "Нейтральный";
            if (avgTilt > 3) tiltDesc = "Положительный (Hunter)";
            if (avgTilt < -3) tiltDesc = "Отрицательный (Prey)";

            // 3. Соотношение ширины челюсти к ширине скул
            const bigonialWidth = dist(jawLeft, jawRight);
            const jawToCheekRatio = (bigonialWidth / bizygomaticWidth * 100).toFixed(1);

            // 4. IPD (Межзрачковое расстояние - в пикселях/пропорциях)
            const ipd = dist(eyeLeftInner, eyeRightInner);
            const faceWidth = bizygomaticWidth;
            const eyeSpacingRatio = (ipd / faceWidth * 100).toFixed(1);

            log('Вычисление пропорций завершено.', 'sys');

            // --- ЖЕСТКАЯ КАЛИБРОВКА ОЦЕНКИ ---
            // Теперь мы не рандомим, а оцениваем физические показатели
            let baseScore = 4.0; // Базовый MTN

            // Оценка FWHR (Идеал ~1.85 - 1.95)
            if (fwhr >= 1.80 && fwhr <= 2.0) baseScore += 1.5;
            else if (fwhr >= 1.7) baseScore += 0.5;
            else baseScore -= 0.5;

            // Оценка глаз (Положительный тилт дает бонус)
            if (avgTilt > 2) baseScore += 1.0;
            else if (avgTilt < -2) baseScore -= 1.0;

            // Оценка ширины челюсти (Идеал 85-95% от ширины скул)
            if (jawToCheekRatio > 85) baseScore += 1.5;
            else if (jawToCheekRatio > 75) baseScore += 0.5;
            else baseScore -= 0.5;

            // Защита от перегруза
            let finalPsl = Math.min(Math.max(baseScore, 3.0), 8.5).toFixed(1);

            let tier = "LTN";
            let color = "var(--accent-2)";
            if(finalPsl >= 7.0) { tier = "CHADLITE"; color = "var(--accent-1)"; }
            else if (finalPsl >= 5.5) { tier = "HTN"; color = "var(--accent-1)"; }
            else if (finalPsl >= 4.5) { tier = "MTN"; color = "var(--chad-gold)"; }

            // Вывод данных
            metricsOutput.innerHTML = `
                <div class="metric-row"><span>FWHR Индекс (Ширина/Высота)</span><span class="metric-val">${fwhr}</span></div>
                <div class="metric-row"><span>Кантальный наклон</span><span class="metric-val">${tiltDesc}</span></div>
                <div class="metric-row"><span>Ширина челюсти к скулам</span><span class="metric-val">${jawToCheekRatio}%</span></div>
                <div class="metric-row"><span>Межглазная пропорция</span><span class="metric-val">${eyeSpacingRatio}%</span></div>
            `;

            document.getElementById('tierLabel').innerText = tier;
            document.getElementById('tierLabel').style.color = color;
            document.getElementById('finalScoreBox').style.borderColor = color;
            document.getElementById('scoreVal').innerText = finalPsl + " / 10 PSL";
            
            finalScoreBox.style.display = 'block';
            log(`Анализ завершен. Результат: ${finalPsl} PSL (${tier})`, 'sys');
        }
    </script>
</body>
</html>
