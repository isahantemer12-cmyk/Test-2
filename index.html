<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Aesthetics Analyzer</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --primary-color: #00ffcc;
            --text-main: #f0f0f0;
            --text-muted: #888;
            --border-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        h1 {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        /* Зона загрузки и фото */
        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background-color: #000;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #preview {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Анимация сканера */
        .scanner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
            display: none;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            text-align: center;
        }

        .btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
        }

        input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        #analyzeBtn {
            margin-top: 1rem;
            display: none;
        }

        /* Зона результатов */
        .results-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .metric {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .metric-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .metric-value {
            color: var(--primary-color);
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 1s ease-out;
        }

        .status-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            min-height: 1.2rem;
        }

        .clinical-notes {
            background: #111;
            padding: 1rem;
            border-left: 3px solid var(--primary-color);
            font-size: 0.85rem;
            color: #ccc;
            margin-top: auto;
            line-height: 1.5;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Клинический Анализ Лица</h1>
        
        <div class="upload-section">
            <div class="image-container" id="imageContainer">
                <span id="placeholderText" style="color: var(--text-muted); font-size: 0.9rem;">Загрузите фото (анфас)</span>
                <img id="preview" alt="Preview">
                <div class="scanner" id="scanner"></div>
            </div>
            
            <div class="file-input-wrapper">
                <button class="btn">Выбрать фото</button>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            
            <button class="btn" id="analyzeBtn">Запустить анализ</button>
            <div class="status-text" id="statusText"></div>
        </div>

        <div class="results-section">
            <div class="metric">
                <div class="metric-header">
                    <span>Гармония лицевых третей</span>
                    <span class="metric-value" id="val-harmony">--%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="bar-harmony"></div></div>
            </div>

            <div class="metric">
                <div class="metric-header">
                    <span>Сексуальный диморфизм</span>
                    <span class="metric-value" id="val-dimorphism">--%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="bar-dimorphism"></div></div>
            </div>

            <div class="metric">
                <div class="metric-header">
                    <span>Четкость линии челюсти (Jawline)</span>
                    <span class="metric-value" id="val-jawline">--%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="bar-jawline"></div></div>
            </div>

            <div class="metric">
                <div class="metric-header">
                    <span>Кантальный наклон (Canthal Tilt)</span>
                    <span class="metric-value" id="val-canthal">--</span>
                </div>
            </div>

            <div class="metric">
                <div class="metric-header">
                    <span>Развитие максиллы</span>
                    <span class="metric-value" id="val-maxilla">--</span>
                </div>
            </div>

            <div class="clinical-notes" id="clinicalNotes">
                <strong>Заключение:</strong> <span id="notesText"></span>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const placeholderText = document.getElementById('placeholderText');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const scanner = document.getElementById('scanner');
        const statusText = document.getElementById('statusText');
        const clinicalNotes = document.getElementById('clinicalNotes');
        const notesText = document.getElementById('notesText');

        // Обработка загрузки изображения
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                    placeholderText.style.display = 'none';
                    analyzeBtn.style.display = 'block';
                    
                    // Сброс результатов
                    resetResults();
                }
                reader.readAsDataURL(file);
            }
        });

        // Функция сброса UI
        function resetResults() {
            document.querySelectorAll('.progress-fill').forEach(el => el.style.width = '0%');
            document.querySelectorAll('.metric-value').forEach(el => el.innerText = '--');
            clinicalNotes.style.display = 'none';
            statusText.innerText = '';
        }

        // Рандомизатор для мок-данных (имитация работы модели)
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function getCanthalTilt() {
            const tilts = ["Нейтральный (Neutral)", "Слегка положительный", "Положительный (Hunter)", "Отрицательный (Negative)"];
            return tilts[Math.floor(Math.random() * tilts.length)];
        }

        function getMaxilla() {
            const types = ["Отличное развитие (Forward growth)", "Среднее развитие", "Плоское (Flat)", "Ретрузия"];
            return types[Math.floor(Math.random() * types.length)];
        }

        // Обработка кнопки анализа
        analyzeBtn.addEventListener('click', function() {
            // Запуск UI сканирования
            scanner.style.display = 'block';
            analyzeBtn.disabled = true;
            statusText.innerText = 'Измерение межзрачкового расстояния (IPD)...';
            
            let progress = 0;
            const steps = [
                'Анализ симметрии лицевых третей...',
                'Оценка проекции максиллы и мандибулы...',
                'Вычисление гониального угла...',
                'Анализ соотношения средних зон...',
                'Компиляция результатов...'
            ];

            // Имитация асинхронного процесса (задержки)
            const interval = setInterval(() => {
                if (progress < steps.length) {
                    statusText.innerText = steps[progress];
                    progress++;
                } else {
                    clearInterval(interval);
                    showResults();
                }
            }, 800); // каждые 800мс меняем статус
        });

        function showResults() {
            scanner.style.display = 'none';
            analyzeBtn.disabled = false;
            statusText.innerText = 'Анализ завершен.';

            // Генерация результатов
            const harmonyScore = getRandomInt(65, 95);
            const dimorphismScore = getRandomInt(60, 98);
            const jawlineScore = getRandomInt(55, 99);
            
            // Анимация баров и значений
            animateValue("val-harmony", harmonyScore, "%");
            document.getElementById('bar-harmony').style.width = harmonyScore + '%';
            
            setTimeout(() => {
                animateValue("val-dimorphism", dimorphismScore, "%");
                document.getElementById('bar-dimorphism').style.width = dimorphismScore + '%';
            }, 300);

            setTimeout(() => {
                animateValue("val-jawline", jawlineScore, "%");
                document.getElementById('bar-jawline').style.width = jawlineScore + '%';
            }, 600);

            setTimeout(() => {
                document.getElementById('val-canthal').innerText = getCanthalTilt();
                document.getElementById('val-maxilla').innerText = getMaxilla();
                
                // Вывод клинического заключения
                clinicalNotes.style.display = 'block';
                notesText.innerText = `База хорошая. Общая пропорциональная гармония оценена в ${harmonyScore}%. Рекомендуется поддержание низкого процента жира (около 10-12%) для максимизации угловатости челюсти.`;
            }, 900);
        }

        // Плавное начисление чисел
        function animateValue(id, end, suffix) {
            let startTimestamp = null;
            const duration = 1000;
            const obj = document.getElementById(id);
            
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * end) + suffix;
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
