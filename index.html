<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Легкий тест JS и C# (80 вопросов)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #222; width: 100%; max-width: 700px; border-radius: 8px; padding: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 1px solid #444; }
        
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #444; }
        .header span { font-weight: bold; }
        
        .progress { background: #333; height: 6px; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: #4CAF50; height: 100%; transition: width 0.3s; }
        
        .question { font-size: 18px; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }
        .category { color: #90CAF9; font-size: 12px; margin-bottom: 10px; }
        
        .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .option { background: #333; border: 2px solid #555; border-radius: 5px; padding: 12px; cursor: pointer; transition: all 0.2s; }
        .option:hover { border-color: #90CAF9; background: #3a3a3a; }
        .option.selected { border-color: #4CAF50; background: #2d5a2d; }
        .option.correct { background: #1b5e20; border-color: #4CAF50; }
        .option.wrong { background: #c62828; border-color: #ff5252; }
        
        .explanation { background: #1a1a1a; border-left: 4px solid #90CAF9; padding: 12px; margin-bottom: 15px; display: none; font-size: 14px; line-height: 1.5; }
        .explanation.show { display: block; }
        .explanation strong { color: #90CAF9; }
        
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .btn-hint { background: #FF9800; color: white; flex: 1; }
        .btn-hint:hover { background: #F57C00; }
        .btn-hint:disabled { background: #666; cursor: not-allowed; }
        .btn-next { background: #4CAF50; color: white; flex: 2; }
        .btn-next:hover { background: #45a049; }
        .btn-back { background: #666; color: white; flex: 1; }
        .btn-back:hover { background: #555; }
        
        .results { display: none; text-align: center; }
        .results h2 { font-size: 32px; color: #4CAF50; margin-bottom: 20px; }
        .score-big { font-size: 48px; font-weight: bold; margin-bottom: 20px; }
        .result-comment { color: #90CAF9; margin-bottom: 20px; line-height: 1.6; }
        
        .stats-table { background: #333; border-radius: 5px; padding: 15px; margin: 20px 0; text-align: left; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #444; }
        .stat-row:last-child { border-bottom: none; }
        
        .btn-restart { background: #2196F3; color: white; margin-top: 20px; padding: 12px 30px; }
        .btn-restart:hover { background: #0b7dda; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz">
        <div class="header">
            <span id="counter">Вопрос 1 / 80</span>
            <span id="score">✓ 0</span>
            <span id="hints">💡 3</span>
        </div>
        
        <div class="progress">
            <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
        </div>
        
        <div id="category" class="category"></div>
        <div id="question" class="question"></div>
        <div id="options" class="options"></div>
        <div id="explanation" class="explanation"></div>
        
        <div class="buttons">
            <button class="btn-hint" id="hint-btn">💡 Подсказка</button>
            <button class="btn-back" id="back-btn">← Назад</button>
            <button class="btn-next" id="next-btn" style="display:none">Дальше →</button>
        </div>
    </div>
    
    <div id="results" class="results">
        <h2>Результат</h2>
        <div class="score-big" id="final-score">0 / 80</div>
        <div id="result-comment" class="result-comment"></div>
        <div id="stats" class="stats-table"></div>
        <button class="btn-restart" onclick="restartQuiz()">Начать заново</button>
    </div>
</div>
