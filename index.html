let current = 0;
let score = 0; 

function show() {
    const q = quizData[current];
    document.getElementById("question").innerText = q.q;
    const ops = document.getElementById("options");
    ops.innerHTML = "";
    
    q.options.forEach((o, i) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = o;
        btn.onclick = () => {
            if(i === q.correct) score++;
            current++;
            if(current < quizData.length) show();
            else {
                document.getElementById("quiz-box").innerHTML = `<div class="result">Тест завершен! Ваш результат: ${score} из ${quizData.length}</div><button class="btn-restart" onclick="location.reload()">Начать заново</button>`;
            }
        };
        ops.appendChild(btn);
    });
    document.getElementById("progress").innerText = `Вопрос ${current + 1} из ${quizData.length}`;
}
show();
</script>
