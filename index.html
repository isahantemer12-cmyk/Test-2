<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSL Clinical Terminal V2.0</title>
    <style>
        :root {
            --bg-base: #050505;
            --panel-bg: #111111;
            --border-dim: #222;
            --border-focus: #444;
            --text-main: #d0d0d0;
            --accent-1: #00ffcc; /* Cyan */
            --accent-2: #ff3366; /* Red/Pink */
            --chad-gold: #ffb700;
            --font-mono: 'Courier New', Courier, monospace;
            --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-1);
            margin: 0;
        }

        .version { font-family: var(--font-mono); font-size: 0.8rem; color: #666; }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            gap: 20px;
            height: calc(100vh - 80px);
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 300px 1fr; }
            .right-panel { grid-column: 1 / -1; }
        }
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; height: auto; }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .panel-header {
            background: #1a1a1a;
            padding: 8px 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-dim);
            color: #888;
        }

        .panel-content { padding: 15px; overflow-y: auto; flex: 1; }

        /* Left Panel - Image & Upload */
        .workspace {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background: #000;
            border: 1px dashed var(--border-focus);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas#overlay {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 10;
        }

        #targetImage {
            max-width: 100%; max-height: 100%;
            object-fit: contain; display: none;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent-1);
            color: var(--accent-1);
            padding: 10px 15px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { background: var(--accent-1); color: #000; }
        .btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        .btn:disabled:hover { background: transparent; color: #555; }

        .upload-wrapper { position: relative; margin-top: 15px; }
        .upload-wrapper input[type="file"] {
            position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;
        }

        /* Center Panel - Console & Terminal */
        .terminal {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: #aaa;
            line-height: 1.5;
            background: #080808;
            padding: 10px;
            height: 100%;
            overflow-y: auto;
        }
        .term-line { margin-bottom: 4px; }
        .term-time { color: #555; margin-right: 8px; }
        .term-sys { color: var(--accent-1); }
        .term-err { color: var(--accent-2); }
        .term-warn { color: var(--chad-gold); }

        /* Right Panel - Analytics & Radar */
        .radar-container {
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #333;
            padding-bottom: 4px;
            font-size: 0.85rem;
        }
        .metric-label { color: #888; }
        .metric-val { font-family: var(--font-mono); color: var(--accent-1); font-weight: bold; }

        .final-score {
            margin-top: 20px;
            padding: 15px;
            background: #151515;
            border: 1px solid var(--chad-gold);
            text-align: center;
            display: none;
        }
        .tier-label { font-size: 1.5rem; font-weight: 900; color: var(--chad-gold); letter-spacing: 2px; }
        .score-val { font-size: 2.5rem; font-family: var(--font-mono); margin: 10px 0; }
        .score-desc { font-size: 0.8rem; color: #aaa; line-height: 1.4; text-align: left; }

        /* Helpers */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>PSL / Facial Biometrics Analyzer</h1>
        <div class="version">Build 2.0.4 // Deterministic Engine</div>
    </header>

    <div class="layout">
        <div class="panel">
            <div class="panel-header">Визуальные данные (Input)</div>
            <div class="panel-content" style="display:flex; flex-direction:column;">
                <div class="workspace" id="workspace">
                    <span id="placeholder">NO SIGNAL</span>
                    <img id="targetImage" alt="Target">
                    <canvas id="overlay"></canvas>
                </div>
                <div class="upload-wrapper">
                    <button class="btn">Выбрать файл</button>
                    <input type="file" id="imageLoader" accept="image/jpeg, image/png, image/webp">
                </div>
                <button class="btn" id="btnAnalyze" disabled>Инициализировать анализ</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Протокол вычислений (Terminal)</div>
            <div class="panel-content" style="padding: 0;">
                <div class="terminal" id="terminal">
                    <div class="term-line"><span class="term-time">[00:00.00]</span><span class="term-sys">Система готова. Ожидание ввода данных...</span></div>
                </div>
            </div>
        </div>

        <div class="panel right-panel">
            <div class="panel-header">Метрики и Вердикт (Output)</div>
            <div class="panel-content">
                <div class="radar-container">
                    <canvas id="radarChart"></canvas>
                </div>
                
                <div class="metrics-grid" id="metricsOutput">
                    <div style="color:#555; text-align:center; font-size: 0.8rem; margin-top:50px;">Данные отсутствуют. Запустите анализ.</div>
                </div>

                <div class="final-score" id="finalScoreBox">
                    <div class="tier-label" id="tierLabel">UNKNOWN</div>
                    <div class="score-val" id="scoreVal">0.0 / 10</div>
                    <div class="score-desc" id="scoreDesc">...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ЭЛЕМЕНТЫ DOM
        const imageLoader = document.getElementById('imageLoader');
        const targetImage = document.getElementById('targetImage');
        const overlay = document.getElementById('overlay');
        const ctxOverlay = overlay.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        const btnAnalyze = document.getElementById('btnAnalyze');
        const terminal = document.getElementById('terminal');
        const radarCanvas = document.getElementById('radarChart');
        const ctxRadar = radarCanvas.getContext('2d');
        const metricsOutput = document.getElementById('metricsOutput');
        const finalScoreBox = document.getElementById('finalScoreBox');

        let imageSeed = 0; // Глобальный сид, зависящий от пикселей фото
        let uploadedImageWidth = 0;
        let uploadedImageHeight = 0;

        // ПСЕВДОСЛУЧАЙНЫЙ ГЕНЕРАТОР НА ОСНОВЕ СИДА (Детерминированность)
        // Гарантирует, что одни и те же числа выпадают для одной и той же фотографии
        class PRNG {
            constructor(seed) { this.seed = seed; }
            next() {
                this.seed = (this.seed * 1664525 + 1013904223) % 4294967296;
                return this.seed / 4294967296;
            }
            range(min, max) { return min + this.next() * (max - min); }
            choice(arr) { return arr[Math.floor(this.next() * arr.length)]; }
        }

        let randomGen = new PRNG(12345);

        // ФУНКЦИЯ ЛОГИРОВАНИЯ В ТЕРМИНАЛ
        function log(msg, type = 'sys') {
            const now = new Date();
            const timeStr = `[${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}.${now.getMilliseconds().toString().padStart(3,'0').substring(0,2)}]`;
            let colorClass = 'term-sys';
            if(type === 'err') colorClass = 'term-err';
            if(type === 'warn') colorClass = 'term-warn';
            
            const div = document.createElement('div');
            div.className = 'term-line';
            div.innerHTML = `<span class="term-time">${timeStr}</span><span class="${colorClass}">${msg}</span>`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // ОБРАБОТКА ЗАГРУЗКИ ФОТО
        imageLoader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            log(`Загрузка файла: ${file.name} (${(file.size/1024).toFixed(2)} KB)`, 'sys');
            
            const reader = new FileReader();
            reader.onload = (event) => {
                targetImage.onload = () => {
                    placeholder.style.display = 'none';
                    targetImage.style.display = 'block';
                    
                    // Настраиваем Canvas под размер картинки
                    const rect = targetImage.getBoundingClientRect();
                    overlay.width = rect.width;
                    overlay.height = rect.height;
                    uploadedImageWidth = rect.width;
                    uploadedImageHeight = rect.height;

                    btnAnalyze.disabled = false;
                    btnAnalyze.innerText = "Инициализировать анализ";
                    log(`Изображение смонтировано. Разрешение: ${targetImage.naturalWidth}x${targetImage.naturalHeight}. Готовность к анализу.`, 'sys');
                    
                    // Сброс интерфейса
                    ctxOverlay.clearRect(0, 0, overlay.width, overlay.height);
                    ctxRadar.clearRect(0, 0, radarCanvas.width, radarCanvas.height);
                    metricsOutput.innerHTML = '';
                    finalScoreBox.style.display = 'none';
                };
                targetImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // ХЕШИРОВАНИЕ ПИКСЕЛЕЙ (Создание уникального отпечатка фото)
        function generateImageHash(imgElement) {
            log('Инициализация канвас-буфера для чтения пикселей...', 'sys');
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            // Масштабируем вниз для скорости
            tempCanvas.width = 100; 
            tempCanvas.height = 100;
            tCtx.drawImage(imgElement, 0, 0, 100, 100);
            
            const imgData = tCtx.getImageData(0, 0, 100, 100).data;
            let hash = 0;
            // Берем каждый 4-й пиксель (только Red канал, чтобы было быстрее)
            for (let i = 0; i < imgData.length; i += 16) {
                hash = ((hash << 5) - hash) + imgData[i] + imgData[i+1] + imgData[i+2];
                hash |= 0; // Convert to 32bit integer
            }
            return Math.abs(hash);
        }

        // АНИМАЦИЯ И РИСОВАНИЕ НА ФОТО (Сетка и точки)
        function drawFacialMapping() {
            const w = overlay.width;
            const h = overlay.height;
            ctxOverlay.clearRect(0, 0, w, h);

            // Имитация сканирующей сетки
            ctxOverlay.strokeStyle = 'rgba(0, 255, 204, 0.15)';
            ctxOverlay.lineWidth = 1;
            for(let i = 0; i < w; i += 20) { ctxOverlay.beginPath(); ctxOverlay.moveTo(i, 0); ctxOverlay.lineTo(i, h); ctxOverlay.stroke(); }
            for(let j = 0; j < h; j += 20) { ctxOverlay.beginPath(); ctxOverlay.moveTo(0, j); ctxOverlay.lineTo(w, j); ctxOverlay.stroke(); }

            // Псевдо-точки (landmarks), зависят от размера картинки, чтобы смотрелось реалистично
            const points = [
                {x: w*0.35, y: h*0.45}, {x: w*0.65, y: h*0.45}, // Глаза
                {x: w*0.5, y: h*0.6}, // Нос
                {x: w*0.4, y: h*0.75}, {x: w*0.6, y: h*0.75}, // Углы рта
                {x: w*0.25, y: h*0.65}, {x: w*0.75, y: h*0.65}, // Гониальные углы (челюсть)
                {x: w*0.5, y: h*0.9} // Подбородок
            ];

            ctxOverlay.fillStyle = '#00ffcc';
            ctxOverlay.strokeStyle = '#00ffcc';
            ctxOverlay.lineWidth = 2;

            // Рисуем связи
            ctxOverlay.beginPath();
            ctxOverlay.moveTo(points[5].x, points[5].y); // Левая челюсть
            ctxOverlay.lineTo(points[7].x, points[7].y); // Подбородок
            ctxOverlay.lineTo(points[6].x, points[6].y); // Правая челюсть
            ctxOverlay.stroke();

            ctxOverlay.beginPath();
            ctxOverlay.moveTo(points[0].x, points[0].y);
            ctxOverlay.lineTo(points[1].x, points[1].y);
            ctxOverlay.setLineDash([5, 5]);
            ctxOverlay.stroke();
            ctxOverlay.setLineDash([]);

            // Рисуем точки
            points.forEach((p, i) => {
                ctxOverlay.beginPath();
                ctxOverlay.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctxOverlay.fill();
                ctxOverlay.font = "10px Courier";
                ctxOverlay.fillText(`P${i}`, p.x + 8, p.y - 8);
            });
        }

        // ОТРИСОВКА РАДАРНОЙ ДИАГРАММЫ (Без внешних библиотек)
        function drawRadarChart(stats) {
            const w = radarCanvas.clientWidth;
            const h = radarCanvas.clientHeight;
            radarCanvas.width = w;
            radarCanvas.height = h;
            
            const cx = w / 2;
            const cy = h / 2;
            const radius = Math.min(w, h) / 2 - 30;
            const sides = stats.length;
            const angle = (Math.PI * 2) / sides;

            // Фон радара (паутина)
            ctxRadar.strokeStyle = '#333';
            ctxRadar.lineWidth = 1;
            for(let step = 0.2; step <= 1; step += 0.2) {
                ctxRadar.beginPath();
                for(let i = 0; i <= sides; i++) {
                    const a = i * angle - Math.PI/2;
                    const x = cx + Math.cos(a) * radius * step;
                    const y = cy + Math.sin(a) * radius * step;
                    if(i === 0) ctxRadar.moveTo(x, y);
                    else ctxRadar.lineTo(x, y);
                }
                ctxRadar.stroke();
            }

            // Оси и текст
            ctxRadar.fillStyle = '#888';
            ctxRadar.font = "11px sans-serif";
            ctxRadar.textAlign = "center";
            ctxRadar.textBaseline = "middle";
            
            stats.forEach((stat, i) => {
                const a = i * angle - Math.PI/2;
                const tx = cx + Math.cos(a) * (radius + 20);
                const ty = cy + Math.sin(a) * (radius + 15);
                ctxRadar.fillText(stat.label, tx, ty);
            });

            // Данные пользователя
            ctxRadar.beginPath();
            ctxRadar.fillStyle = 'rgba(0, 255, 204, 0.3)';
            ctxRadar.strokeStyle = '#00ffcc';
            ctxRadar.lineWidth = 2;

            stats.forEach((stat, i) => {
                const a = i * angle - Math.PI/2;
                const valRadius = radius * (stat.value / 100);
                const x = cx + Math.cos(a) * valRadius;
                const y = cy + Math.sin(a) * valRadius;
                if(i === 0) ctxRadar.moveTo(x, y);
                else ctxRadar.lineTo(x, y);
                
                // Кружочки на концах
                ctxRadar.arc(x, y, 3, 0, Math.PI*2);
                ctxRadar.moveTo(x, y); // Возврат кисти
            });
            ctxRadar.closePath();
            ctxRadar.fill();
            ctxRadar.stroke();
        }

        // ЗАПУСК АНАЛИЗА
        btnAnalyze.addEventListener('click', async () => {
            btnAnalyze.disabled = true;
            btnAnalyze.innerText = "Анализ в процессе...";
            
            // 1. Вычисляем хэш
            log('Запуск алгоритма хеширования матрицы пикселей...', 'sys');
            imageSeed = generateImageHash(targetImage);
            randomGen = new PRNG(imageSeed); // Инициализация генератора с сидом картинки
            log(`Сгенерирован уникальный биометрический ключ: 0x${imageSeed.toString(16).toUpperCase()}`, 'warn');

            // 2. Фейковые задержки для имитации работы нейросети
            const steps = [
                {msg: "Детекция краев (Canny Edge Detection)...", delay: 500},
                {msg: "Распознавание ключевых точек (Landmark mapping 68 pts)...", delay: 800, action: drawFacialMapping},
                {msg: "Измерение индекса FWHR (Facial Width-to-Height Ratio)...", delay: 1200},
                {msg: "Оценка проекции и площади глазницы...", delay: 1500},
                {msg: "Вычисление отношения ширины скул к ширине челюсти (Bizygomatic-to-Bigonial)...", delay: 1800},
                {msg: "Агрегация данных и калибровка PSL метрик...", delay: 2200}
            ];

            let cumulativeDelay = 0;
            for (let i = 0; i < steps.length; i++) {
                cumulativeDelay += (steps[i].delay - (i > 0 ? steps[i-1].delay : 0));
                setTimeout(() => {
                    log(steps[i].msg, 'sys');
                    if(steps[i].action) steps[i].action();
                }, cumulativeDelay);
            }

            // 3. Вывод результатов
            setTimeout(() => {
                generateFinalReport();
                btnAnalyze.innerText = "Анализ завершен";
            }, cumulativeDelay + 500);
        });

        function generateFinalReport() {
            log('Формирование клинического отчета...', 'warn');

            // Детерминированная генерация метрик на основе сида фото
            const fwhr = randomGen.range(1.6, 2.1).toFixed(2);
            const canthalTilt = randomGen.choice(["Положительный (Hunter)", "Нейтральный", "Отрицательный", "Слегка положительный"]);
            const midfaceRatio = randomGen.range(0.85, 1.1).toFixed(2);
            const ipd = randomGen.range(58, 70).toFixed(1) + " мм";
            const symmetry = randomGen.range(75, 98).toFixed(1) + "%";
            
            // Заполнение левого списка метрик
            metricsOutput.innerHTML = `
                <div class="metric-row"><span class="metric-label">FWHR Индекс</span><span class="metric-val">${fwhr}</span></div>
                <div class="metric-row"><span class="metric-label">Кантальный наклон</span><span class="metric-val">${canthalTilt}</span></div>
                <div class="metric-row"><span class="metric-label">Симметрия</span><span class="metric-val">${symmetry}</span></div>
                <div class="metric-row"><span class="metric-label">Компактность ср. зоны (Midface)</span><span class="metric-val">${midfaceRatio}</span></div>
                <div class="metric-row"><span class="metric-label">Расстояние между зрачками (IPD)</span><span class="metric-val">${ipd}</span></div>
            `;

            // Статы для радара (от 0 до 100)
            const stats = [
                {label: "Маскулинность", value: randomGen.range(50, 100)},
                {label: "Симметрия", value: randomGen.range(60, 98)},
                {label: "Глазная зона", value: randomGen.range(40, 95)},
                {label: "Развитие челюсти", value: randomGen.range(45, 100)},
                {label: "Гармония третей", value: randomGen.range(55, 95)}
            ];
            
            drawRadarChart(stats);

            // Вычисление итогового балла
            let totalAvg = stats.reduce((acc, curr) => acc + curr.value, 0) / 5;
            // Перевод 100-балльной шкалы в 10-балльную PSL (от 3.5 до 8.5 для реализма)
            let pslScore = ((totalAvg / 100) * 5 + 3.5).toFixed(1);

            let tier = "LTN";
            let color = "#ff4444";
            let desc = "Требуется серьезный hardmaxxing. Костная структура недоразвита.";

            if(pslScore >= 7.5) { tier = "CHAD"; color = "var(--chad-gold)"; desc = "Генетическая элита (Top 1%). Экстремальный диморфизм и идеальные пропорции костей черепа."; }
            else if(pslScore >= 6.0) { tier = "CHADLITE"; color = "var(--accent-1)"; desc = "Отличная база (Top 10-15%). Высокий потенциал. Низкий процент жира сделает лицо точеным."; }
            else if (pslScore >= 5.0) { tier = "HTN"; color = "#33ccff"; desc = "Выше среднего. Необходим grooming и softmaxxing (уход за кожей, прическа) для максимизации результата."; }
            else if (pslScore >= 4.0) { tier = "MTN"; color = "#aadd00"; desc = "Среднестатистическое развитие. Выраженные недостатки отсутствуют, но и выдающихся черт нет. Рекомендован mewing."; }

            document.getElementById('tierLabel').innerText = tier;
            document.getElementById('tierLabel').style.color = color;
            document.getElementById('finalScoreBox').style.borderColor = color;
            document.getElementById('scoreVal').innerText = pslScore + " / 10 PSL";
            document.getElementById('scoreDesc').innerText = desc;
            
            finalScoreBox.style.display = 'block';
            log('Отчет успешно сгенерирован и выведен на экран.', 'sys');
        }
    </script>
</body>
</html>
