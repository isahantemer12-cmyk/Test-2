<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strict PSL Engine v4.5 - Spatial Correction</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        :root {
            --bg-base: #020202;
            --panel-bg: #070707;
            --border-dim: #151515;
            --border-focus: #333;
            --text-main: #999;
            --accent-1: #00ffcc;
            --chad-gold: #ffcc00;
            --brutal-red: #ff0033;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-mono);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        header {
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { 
            font-size: 1.4rem; 
            color: var(--brutal-red); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-shadow: 0 0 10px rgba(255,0,51,0.3); 
        }

        .layout {
            display: grid;
            grid-template-columns: 360px 1fr 380px;
            gap: 20px;
            height: calc(100vh - 90px);
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 360px 1fr; }
            .right-panel { grid-column: 1 / -1; }
        }
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; height: auto; }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #000;
            padding: 10px 15px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #444;
            border-bottom: 1px solid var(--border-dim);
            letter-spacing: 1px;
        }

        .panel-content { padding: 15px; overflow-y: auto; flex: 1; }

        .workspace {
            position: relative;
            width: 100%;
            min-height: 280px;
            background: #000;
            border: 1px dashed var(--border-focus);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        #targetImage { max-width: 100%; height: auto; display: block; filter: grayscale(100%) contrast(125%) brightness(85%); }
        canvas#overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

        .btn {
            background: transparent;
            border: 1px solid var(--border-focus);
            color: var(--text-main);
            padding: 14px;
            font-family: var(--font-mono);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .btn:hover:not(:disabled) { border-color: var(--accent-1); color: var(--accent-1); box-shadow: inset 0 0 15px rgba(0,255,204,0.1); }
        .btn:disabled { border-color: #111; color: #222; cursor: not-allowed; }

        .terminal { font-size: 0.78rem; line-height: 1.6; }
        .term-line { margin-bottom: 4px; border-bottom: 1px solid #0a0a0a; padding-bottom: 2px; }
        .term-time { color: #333; margin-right: 8px; }
        .term-sys { color: #666; }
        .term-err { color: var(--brutal-red); }
        .term-warn { color: var(--chad-gold); }
        .term-plus { color: var(--accent-1); }

        .metric-row { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 12px 0; font-size: 0.85rem;}
        .metric-val { color: #fff; font-weight: bold; }

        .final-score { margin-top: 15px; padding: 20px; background: #000; border: 1px solid var(--border-dim); text-align: center; }
        .tier-label { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; }
        .score-val { font-size: 3.2rem; margin: 10px 0; font-weight: bold; }
        .score-desc { font-size: 0.8rem; color: #666; line-height: 1.5; text-align: left; padding-top: 15px; border-top: 1px solid #111;}
        
        .cursor { display: inline-block; width: 6px; height: 12px; background: #444; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Strict PSL Engine</h1>
            <div style="color: #333; font-size: 0.7rem; margin-top: 3px;">v4.5.2 // Orthographic & Adiposity Normalization</div>
        </div>
        <div style="color: #222; font-size: 0.7rem; text-align: right; line-height: 1.3;">
            SPATIAL FILTER: ACTIVE<br>
            LENS DISTORTION COMPENSATED
        </div>
    </header>

    <div class="layout">
        <!-- ЛЕВАЯ ПАНЕЛЬ -->
        <div class="panel">
            <div class="panel-header">Биометрический Ввод</div>
            <div class="panel-content">
                <div class="workspace">
                    <span id="placeholder" style="font-size: 0.75rem; color: #333;">[ ОЖИДАНИЕ ЯДРА ]</span>
                    <div class="img-container" id="imgContainer" style="display: none;">
                        <img id="targetImage" alt="Target Face">
                        <canvas id="overlay"></canvas>
                    </div>
                </div>
                <div style="position: relative;">
                    <button class="btn" id="uploadBtn" disabled>Загрузить скан</button>
                    <input type="file" id="imageLoader" accept="image/jpeg, image/png, image/webp" style="position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;" disabled>
                </div>
            </div>
        </div>

        <!-- ТЕРМИНАЛ -->
        <div class="panel">
            <div class="panel-header">Анализ геометрии (Spatial Log)</div>
            <div class="panel-content" style="background: #000; position: relative;">
                <div class="terminal" id="terminal"></div>
                <div class="cursor"></div>
            </div>
        </div>

        <!-- МЕТРИКИ -->
        <div class="panel right-panel">
            <div class="panel-header">Результаты Кранчирования</div>
            <div class="panel-content">
                <div id="metricsOutput">
                    <div style="color:#222; text-align:center; margin-top: 60px;">Система готова к сканированию...</div>
                </div>
                <div class="final-score" id="finalScoreBox" style="display:none;">
                    <div class="tier-label" id="tierLabel">UNKNOWN</div>
                    <div class="score-val" id="scoreVal" style="color: #fff;">0.0</div>
                    <div class="score-desc" id="scoreDesc">...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const targetImage = document.getElementById('targetImage');
        const overlay = document.getElementById('overlay');
        const imgContainer = document.getElementById('imgContainer');
        const placeholder = document.getElementById('placeholder');
        const terminal = document.getElementById('terminal');
        const uploadBtn = document.getElementById('uploadBtn');
        const metricsOutput = document.getElementById('metricsOutput');
        const finalScoreBox = document.getElementById('finalScoreBox');

        let modelsLoaded = false;

        function log(msg, type = 'sys', delay = 0) {
            return new Promise(resolve => {
                setTimeout(() => {
                    let color = 'term-sys';
                    if(type === 'err') color = 'term-err';
                    if(type === 'warn') color = 'term-warn';
                    if(type === 'plus') color = 'term-plus';
                    terminal.innerHTML += `<div class="term-line"><span class="term-time">&gt;</span><span class="${color}">${msg}</span></div>`;
                    terminal.parentElement.scrollTop = terminal.parentElement.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        async function initAI() {
            await log('Запуск ядра калибровки v4.5...', 'sys', 200);
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                await log('Нейросетевые веса развернуты.', 'sys', 200);
                await log('Матрица компенсации наклона Roll/Pitch интегрирована.', 'plus', 100);
                modelsLoaded = true;
                placeholder.innerText = "[ СЕНСОР СВОБОДЕН ]";
                uploadBtn.disabled = false;
                imageLoader.disabled = false;
            } catch (e) {
                await log('FATAL: Ошибка деплоя нейросети.', 'err');
            }
        }

        window.addEventListener('load', initAI);

        imageLoader.addEventListener('change', async (e) => {
            if (!modelsLoaded) return;
            const file = e.target.files[0];
            if (!file) return;

            placeholder.style.display = 'none';
            imgContainer.style.display = 'inline-block';
            metricsOutput.innerHTML = '<div style="color:#222; text-align:center; margin-top: 50px;">Вычисление векторов...</div>';
            finalScoreBox.style.display = 'none';
            terminal.innerHTML = '';
            
            const imgURL = URL.createObjectURL(file);
            targetImage.src = imgURL;

            targetImage.onload = async () => {
                overlay.width = targetImage.width;
                overlay.height = targetImage.height;

                const detection = await faceapi.detectSingleFace(targetImage, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();

                if (!detection) {
                    await log('CRITICAL ERROR: Лицо не распознано. Измените ракурс.', 'err');
                    return;
                }

                const dims = faceapi.matchDimensions(overlay, targetImage, true);
                const resizedResults = faceapi.resizeResults(detection, dims);
                
                const ctx = overlay.getContext('2d');
                ctx.fillStyle = 'rgba(0, 255, 204, 0.7)';
                resizedResults.landmarks.positions.forEach(p => ctx.fillRect(p.x, p.y, 2, 2));

                calculateStrictMetrics(resizedResults.landmarks);
            };
        });

        async function calculateStrictMetrics(landmarks) {
            const points = landmarks.positions;
            const dist = (p1, p2) => Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));

            // 1. КОМПЕНСАЦИЯ НАКЛОНА ГОЛОВЫ (Roll Correction)
            // Вычисляем базовый угол лица по внутренним углам глаз (39 и 42)
            const eyeLeftInner = points[39];
            const eyeRightInner = points[42];
            const headRollAngle = Math.atan2(eyeRightInner.y - eyeLeftInner.y, eyeRightInner.x - eyeLeftInner.x);
            
            await log(`Коррекция осевого смещения: ${(headRollAngle * 180 / Math.PI).toFixed(1)}°`, 'sys', 100);

            // Функция вычисления угла, очищенная от наклона головы
            const getCorrectedAngle = (p1, p2, reverse = false) => {
                let raw = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                let corrected = reverse ? (raw + headRollAngle) : (raw - headRollAngle);
                return (corrected * 180) / Math.PI;
            };

            // 2. ВЫЧИСЛЕНИЕ АНАТОМИЧЕСКИХ ВЕКТОРОВ
            const cheekLeft = points[2], cheekRight = points[14]; // Скуловые кости
            const jawLeft = points[0], jawRight = points[16];     // Углы челюсти (Gonial)
            const buccalLeft = points[4], buccalRight = points[12]; // Нижняя часть щек (под скулами)
            const nasion = points[27], upperLip = points[51], chinBottom = points[8];

            const bizygomaticWidth = dist(cheekLeft, cheekRight);
            const totalFaceHeight = dist(nasion, chinBottom);
            const upperFacialHeight = dist(nasion, upperLip);
            
            // FWHR (Индекс компактности)
            let fwhr = (bizygomaticWidth / upperFacialHeight).toFixed(2);

            // Вычисление углов глаз с поправкой на Roll наклона
            const leftTilt = getCorrectedAngle(points[36], points[39]);
            const rightTilt = getCorrectedAngle(points[42], points[45]);
            const avgCanthalTilt = (leftTilt + rightTilt) / 2;

            // Коэффициент сужения лица (Cheek Taper / Lean Index)
            const buccalWidth = dist(buccalLeft, buccalRight);
            const bigonialWidth = dist(jawLeft, jawRight);
            
            // Важнейший показатель: насколько щеки западают внутрь относительно скул
            const cheekHollowRatio = (buccalWidth / bizygomaticWidth).toFixed(3);
            // Соотношение челюсти к скулам
            const jawCheekRatio = (bigonialWidth / bizygomaticWidth * 100).toFixed(1);

            // Компактность глазной орбиты (Supraorbital Hooding Index)
            // Расстояние от брови до глаза к ширине глаза
            const browEyeLeft = dist(points[19], points[37]);
            const browEyeRight = dist(points[24], points[44]);
            const eyeWidth = dist(points[36], points[39]);
            const browCompactness = ((browEyeLeft + browEyeRight) / (2 * eyeWidth)).toFixed(2);

            // Сборка итогового балла
            let baseScore = 5.0; // Старт с чистого среднего значения
            await log('--- ЗАПУСК spatial-анализа ---', 'warn', 150);

            // Оценка структуры: Запавшие щеки vs Жировой отек (Bloat)
            // На сухом лице (image_2) cheekHollowRatio будет низким (< 0.83), так как щеки «ввалены» внутрь
            let adiposityPenalty = 0;
            let bfProxy = 15;
            
            if (cheekHollowRatio < 0.81) {
                bfProxy = Math.round(9 + (cheekHollowRatio - 0.76) * 100);
                baseScore += 1.5;
                await log(`[+] Рельеф: Выявлен эффект Hollow Cheeks (${cheekHollowRatio}). Экстремальная четкость кости.`, 'plus', 200);
            } else if (cheekHollowRatio <= 0.85) {
                bfProxy = Math.round(13 + (cheekHollowRatio - 0.81) * 100);
                baseScore += 0.5;
                await log(`[+] Рельеф: Ткани сухие, структура щек оптимальна.`, 'plus', 100);
            } else if (cheekHollowRatio <= 0.89) {
                bfProxy = Math.round(17 + (cheekHollowRatio - 0.85) * 100);
                baseScore -= 0.7;
                await log(`[-] Отек: Признаки Fat Bloat (${cheekHollowRatio}). Костный каркас сглажен. Штраф.`, 'err', 200);
            } else {
                bfProxy = Math.round(23 + (cheekHollowRatio - 0.89) * 100);
                baseScore -= 2.0;
                await log(`[-] CRITICAL BLOAT: Кости лица полностью скрыты подкожным жиром. Штраф.`, 'err', 200);
            }
            bfProxy = Math.min(Math.max(bfProxy, 8), 35);

            // Оценка взгляда (Ролл-корректный Canthal Tilt)
            let tiltStatus = "Neutral";
            if (avgCanthalTilt > 3.5) {
                baseScore += 1.2;
                tiltStatus = `Positive (+${avgCanthalTilt.toFixed(1)}°)`;
                await log(`[+] Глаза: Выраженный Hunter-взгляд. Угол: +${avgCanthalTilt.toFixed(1)}°`, 'plus', 150);
            } else if (avgCanthalTilt >= -1) {
                baseScore += 0.2;
                tiltStatus = `Neutral (+${avgCanthalTilt.toFixed(1)}°)`;
                await log(`[~] Глаза: Около-нейтральный баланс векторов (+${avgCanthalTilt.toFixed(1)}°)`, 'sys', 150);
            } else {
                baseScore -= 1.5;
                tiltStatus = `Negative (${avgCanthalTilt.toFixed(1)}°)`;
                await log(`[-] FATAL: Отрицательный наклон век (Prey eyes). Сильный дебафф.`, 'err', 150);
            }

            // Компактность орбитальной зоны (Brow-to-eye)
            // Меньше значение = плотнее бровь сидит над глазом, злее и маскулиннее взгляд
            if (browCompactness < 0.65) {
                baseScore += 0.8;
                await log(`[+] Орбита: Сверхкомпактная посадка бровей (${browCompactness}). Глубокий взгляд.`, 'plus', 150);
            } else if (browCompactness > 0.85) {
                baseScore -= 0.8;
                await log(`[-] Орбита: Высокая "нормисная" бровь (${browCompactness}). Отсутствие надбровного давления.`, 'warn', 150);
            }

            // Нижняя треть (Челюстной баланс с учетом сухости)
            // Если лицо худое (V-shape), узкая челюсть — это эстетика. Если лицо жирное и челюсть узкая — это провал.
            if (jawCheekRatio >= 86) {
                baseScore += 0.8;
                await log(`[+] Кость: Широкий массив Gonial углов (${jawCheekRatio}%).`, 'plus', 100);
            } else if (jawCheekRatio >= 80 && cheekHollowRatio < 0.84) {
                baseScore += 0.5; // Модельный тип: челюсть чуть уже скул, но за счет худобы выглядит отлично
                await log(`[+] Кость: Модельный V-образный конус челюсти на сухом лице.`, 'plus', 100);
            } else if (jawCheekRatio < 76) {
                baseScore -= 1.5;
                await log(`[-] FATAL: Критически узкая кость нижней трети (${jawCheekRatio}%). Регрессия.`, 'err', 100);
            }

            // Нормализация FWHR (Компенсация дисторсии длинного/короткого лица)
            if (fwhr >= 1.70 && fwhr <= 2.05) {
                baseScore += 0.5;
            } else if (fwhr < 1.60) {
                baseScore -= 1.0;
                await log(`[-] Пропорции: Избыточная вертикаль черепа (Long Midface Index).`, 'warn', 100);
            }

            // Фиксация финального ранга в жестких рамках PSL (от 1.5 до 9.0)
            let finalPsl = Math.min(Math.max(baseScore, 1.5), 9.0).toFixed(1);

            // Определение тира по строгой шкале
            let tier = "SUB-5 (OVER)"; let color = "var(--brutal-red)";
            let desc = "Генетический дефицит угловатости либо критическая плотность мягких тканей. Структура лица размыта.";

            if (finalPsl >= 7.5) {
                tier = "CHAD"; color = "var(--accent-1)";
                desc = "Экстремально высокий уровень диморфизма. Острый рельеф костей, глубокие тени в щечных впадинах, хищная посадка глаз орбит. Полное отсутствие подкожного блуатинга.";
            } else if (finalPsl >= 6.4) {
                tier = "CHADLITE"; color = "var(--chad-gold)";
                desc = "Высокий эстетический потенциал костных структур. Лицо полностью обезжирено, углы выражены. Минимальные отклонения от идеальных осей.";
            } else if (finalPsl >= 5.4) {
                tier = "HTN (High Normie)"; color = "#88cc00";
                desc = "Хорошая, чистая база. Кости читаются отлично. Присутствует рельеф челюсти и скул. Конкурентоспособный тир.";
            } else if (finalPsl >= 4.4) {
                tier = "MTN (Mid Normie)"; color = "var(--normie-gray)";
                desc = "Среднестатистический показатель. Анатомические векторы сбалансированы, но лицу не хватает резкости углов и глубины теней. Обычный гражданский фенотип.";
            } else if (finalPsl >= 3.5) {
                tier = "LTN (Low Normie)"; color = "#ff5500";
                desc = "Лицо имеет выраженную мягкость, костные ориентиры сглажены жировой прослойкой или слабой генетикой.";
            }

            // Вывод метрик на экран
            metricsOutput.innerHTML = `
                <div class="metric-row"><span>Canthal Tilt (Roll-Corrected)</span><span class="metric-val" style="color:${avgCanthalTilt < 0 ? 'var(--brutal-red)' : 'var(--accent-1)'}">${tiltStatus}</span></div>
                <div class="metric-row"><span>Cheek Hollow Index</span><span class="metric-val" style="color:${cheekHollowRatio > 0.85 ? 'var(--brutal-red)' : 'var(--accent-1)'}">${cheekHollowRatio}</span></div>
                <div class="metric-row"><span>Estimated Face Fat</span><span class="metric-val" style="color:${bfProxy >= 18 ? 'var(--brutal-red)' : 'var(--accent-1)'}">${bfProxy}%</span></div>
                <div class="metric-row"><span>Orbital Compactness</span><span class="metric-val" style="color:${browCompactness > 0.85 ? 'var(--brutal-red)' : 'var(--accent-1)'}">${browCompactness}</span></div>
                <div class="metric-row"><span>Jaw/Cheek Ratio</span><span class="metric-val">${jawCheekRatio}%</span></div>
            `;

            document.getElementById('tierLabel').innerText = tier;
            document.getElementById('tierLabel').style.color = color;
            document.getElementById('finalScoreBox').style.borderColor = color;
            document.getElementById('scoreVal').innerHTML = `${finalPsl} <span style="font-size:1rem; color:#333;">/ 10 PSL</span>`;
            document.getElementById('scoreDesc').innerText = desc;
            
            finalScoreBox.style.display = 'block';
            await log(`>>> РАСЧЕТ ОКОНЧЕН. ИТОГ: ${finalPsl} PSL.`, 'sys', 200);
            await log(`>>> ТИР-КЛАССИФИКАЦИЯ: ${tier} <<<`, 'warn', 100);
        }
    </script>
</body>
</html>
