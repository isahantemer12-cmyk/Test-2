<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система тестирования: HTML и CSS</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --primary-hover: #365580;
            --bg: #f4f7f6;
            --container-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border: #dddddd;
            --correct-bg: #d4edda;
            --correct-border: #c3e6cb;
            --correct-text: #155724;
            --wrong-bg: #f8d7da;
            --wrong-border: #f5c6cb;
            --wrong-text: #721c24;
            --transition: 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .app-container {
            background: var(--container-bg);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
        }

        /* Утилиты видимости */
        .hidden { display: none !important; }

        /* Заголовки */
        h1, h2 { color: var(--primary); margin-bottom: 20px; text-align: center; }

        /* Стили кнопок */
        .btn {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: var(--transition);
            display: inline-block;
            text-align: center;
            margin: 5px;
        }

        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }

        /* Информационная панель */
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        /* Прогресс-бар */
        .progress-container {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Область вопроса */
        .question { font-size: 20px; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }

        /* Варианты ответов */
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option {
            display: block;
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
            background: var(--container-bg);
            transition: var(--transition);
        }
        .option:hover { border-color: var(--primary); background: #f8faff; }

        /* Экраны результатов и анализа */
        .result-stats {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin: 30px 0;
        }
        
        .stat-box {
            display: flex;
            justify-content: space-around;
            background: var(--bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 14px; color: var(--text-muted); }

        /* Блок анализа ошибок */
        .analysis-item {
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .analysis-item.correct { background: var(--correct-bg); border-color: var(--correct-border); }
        .analysis-item.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); }
        .analysis-q { font-weight: bold; margin-bottom: 10px; }
        .analysis-ans { font-size: 14px; margin-bottom: 5px; }
        .analysis-exp { font-size: 13px; color: #555; margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.1); }

        /* История */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .history-table th, .history-table td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        .history-table th { background: var(--bg); font-weight: 600; }

        @media (max-width: 600px) {
            .app-container { padding: 20px; }
            .stat-box { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="screen-start" class="screen">
        <h1>Тестирование HTML & CSS</h1>
        <p style="text-align: center; margin-bottom: 30px; color: var(--text-muted);">
            Вопросы со 101 по 200. Подробная аналитика доступна после завершения.
        </p>
        <div style="text-align: center;">
            <button class="btn" onclick="app.startTest()">Начать тестирование</button>
            <button class="btn btn-outline" onclick="app.showHistory()">История попыток</button>
        </div>
    </div>

    <div id="screen-quiz" class="screen hidden">
        <div class="header-info">
            <span id="question-counter">Вопрос 1 из 100</span>
            <span id="timer">Время: 00:00</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="question-text" class="question"></div>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="screen-result" class="screen hidden">
        <h2>Тестирование завершено!</h2>
        <div class="stat-box">
            <div class="stat-item">
                <span class="stat-value" id="res-score">0</span>
                <span class="stat-label">Правильных ответов</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="res-percent">0%</span>
                <span class="stat-label">Успешность</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="res-time">00:00</span>
                <span class="stat-label">Затрачено времени</span>
            </div>
        </div>
        <div style="text-align: center; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;">
            <button class="btn" onclick="app.showAnalysis()">Разбор ошибок</button>
            <button class="btn btn-outline" onclick="app.exportReport()">Скачать отчет (TXT)</button>
            <button class="btn btn-outline" onclick="location.reload()">На главную</button>
        </div>
    </div>

    <div id="screen-analysis" class="screen hidden">
        <h2>Подробный разбор</h2>
        <button class="btn btn-outline" style="margin-bottom: 20px;" onclick="app.showScreen('screen-result')">← Назад к результатам</button>
        <div id="analysis-container"></div>
    </div>

    <div id="screen-history" class="screen hidden">
        <h2>История прохождений</h2>
        <button class="btn btn-outline" style="margin-bottom: 20px;" onclick="app.showScreen('screen-start')">← Назад</button>
        <button class="btn btn-outline" style="margin-bottom: 20px; color: red; border-color: red;" onclick="app.clearHistory()">Очистить историю</button>
        <div style="overflow-x: auto;">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Счет</th>
                        <th>Процент</th>
                        <th>Время</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

</div>

<script>

/**
 * Архитектура приложения
 * Используем ООП подход для удобства анализа и расширения кода в будущем.
 */
class QuizApp {
    constructor(data) {
        this.data = data;
        this.current = 0;
        this.score = 0;
        this.userAnswers = [];
        this.timerInterval = null;
        this.timeSeconds = 0;
        
        this.initDOM();
    }

    initDOM() {
        this.els = {
            screens: document.querySelectorAll('.screen'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            progress: document.getElementById('progress-bar'),
            counter: document.getElementById('question-counter'),
            timer: document.getElementById('timer'),
            
            // Результаты
            resScore: document.getElementById('res-score'),
            resPercent: document.getElementById('res-percent'),
            resTime: document.getElementById('res-time'),
            
            analysisContainer: document.getElementById('analysis-container'),
            historyBody: document.getElementById('history-body')
        };
    }

    showScreen(id) {
        this.els.screens.forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    startTest() {
        this.current = 0;
        this.score = 0;
        this.userAnswers = [];
        this.timeSeconds = 0;
        
        this.startTimer();
        this.showScreen('screen-quiz');
        this.renderQuestion();
    }

    startTimer() {
        clearInterval(this.timerInterval);
        this.timerInterval = setInterval(() => {
            this.timeSeconds++;
            const m = Math.floor(this.timeSeconds / 60).toString().padStart(2, '0');
            const s = (this.timeSeconds % 60).toString().padStart(2, '0');
            this.els.timer.innerText = `Время: ${m}:${s}`;
        }, 1000);
    }

    renderQuestion() {
        const q = this.data[this.current];
        this.els.questionText.innerText = q.q;
        this.els.optionsContainer.innerHTML = '';
        
        // Обновление прогресса
        const progressPercent = (this.current / this.data.length) * 100;
        this.els.progress.style.width = `${progressPercent}%`;
        this.els.counter.innerText = `Вопрос ${this.current + 1} из ${this.data.length}`;

        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => this.handleAnswer(index);
            this.els.optionsContainer.appendChild(btn);
        });
    }

    handleAnswer(selectedIndex) {
        const q = this.data[this.current];
        const isCorrect = selectedIndex === q.correct;
        
        if (isCorrect) this.score++;
        
        // Сохраняем для аналитики
        this.userAnswers.push({
            question: q.q,
            selectedText: q.options[selectedIndex],
            correctText: q.options[q.correct],
            isCorrect: isCorrect,
            explanation: q.explanation || "Дополнительное объяснение отсутствует."
        });

        this.current++;
        
        if (this.current < this.data.length) {
            this.renderQuestion();
        } else {
            this.endTest();
        }
    }

    endTest() {
        clearInterval(this.timerInterval);
        
        const percent = Math.round((this.score / this.data.length) * 100);
        const m = Math.floor(this.timeSeconds / 60).toString().padStart(2, '0');
        const s = (this.timeSeconds % 60).toString().padStart(2, '0');
        const timeStr = `${m}:${s}`;

        this.els.resScore.innerText = `${this.score} / ${this.data.length}`;
        this.els.resPercent.innerText = `${percent}%`;
        this.els.resTime.innerText = timeStr;

        this.saveToHistory(this.score, percent, timeStr);
        this.showScreen('screen-result');
    }

    showAnalysis() {
        this.els.analysisContainer.innerHTML = '';
        
        this.userAnswers.forEach((ans, i) => {
            const div = document.createElement('div');
            div.className = `analysis-item ${ans.isCorrect ? 'correct' : 'wrong'}`;
            
            let html = `
                <div class="analysis-q">${ans.question}</div>
                <div class="analysis-ans"><b>Ваш ответ:</b> ${ans.selectedText}</div>
            `;
            
            if (!ans.isCorrect) {
                html += `<div class="analysis-ans" style="color: var(--wrong-text);"><b>Правильный ответ:</b> ${ans.correctText}</div>`;
            }
            
            html += `<div class="analysis-exp"><b>Пояснение:</b> ${ans.explanation}</div>`;
            
            div.innerHTML = html;
            this.els.analysisContainer.appendChild(div);
        });
        
        this.showScreen('screen-analysis');
    }

    saveToHistory(score, percent, time) {
        const history = JSON.parse(localStorage.getItem('quizHistory')) || [];
        const date = new Date().toLocaleString('ru-RU');
        
        history.push({ date, score, percent, time });
        localStorage.setItem('quizHistory', JSON.stringify(history));
    }

    showHistory() {
        const history = JSON.parse(localStorage.getItem('quizHistory')) || [];
        this.els.historyBody.innerHTML = '';
        
        if (history.length === 0) {
            this.els.historyBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">История пуста</td></tr>';
        } else {
            // Показываем новые попытки сверху
            history.reverse().forEach(record => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${record.date}</td>
                    <td>${record.score} / ${this.data.length}</td>
                    <td>${record.percent}%</td>
                    <td>${record.time}</td>
                `;
                this.els.historyBody.appendChild(tr);
            });
        }
        
        this.showScreen('screen-history');
    }

    clearHistory() {
        if(confirm("Вы уверены, что хотите удалить всю историю прохождений?")) {
            localStorage.removeItem('quizHistory');
            this.showHistory();
        }
    }

    exportReport() {
        let report = `ОТЧЕТ О ПРОХОЖДЕНИИ ТЕСТА\n`;
        report += `Дата: ${new Date().toLocaleString('ru-RU')}\n`;
        report += `Результат: ${this.score} из ${this.data.length} (${Math.round((this.score / this.data.length) * 100)}%)\n`;
        const m = Math.floor(this.timeSeconds / 60).toString().padStart(2, '0');
        const s = (this.timeSeconds % 60).toString().padStart(2, '0');
        report += `Затраченное время: ${m}:${s}\n\n`;
        report += `--- ДЕТАЛЬНЫЙ АНАЛИЗ ОШИБОК ---\n\n`;

        const errors = this.userAnswers.filter(ans => !ans.isCorrect);
        
        if (errors.length === 0) {
            report += `Ошибок нет. Идеальный результат!\n`;
        } else {
            errors.forEach((err, i) => {
                report += `${i + 1}. ${err.question}\n`;
                report += `   Вы выбрали: ${err.selectedText}\n`;
                report += `   Правильный ответ: ${err.correctText}\n`;
                report += `   Справка: ${err.explanation}\n\n`;
            });
        }

        // Создание Blob и скачивание (имитация генерации файла для практики)
        const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `quiz_report_${new Date().getTime()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
}

const app = new QuizApp(quizData);
